        const LeafIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>;
        const HistoryIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>;

        // --- データ管理（LocalStorage） ---
        const useAppData = () => {
            const [staffList, setStaffList] = useState(() => {
                const withDefaults = (s) => {
                    const base = typeof s === 'string' ? { name: s, defaultMeal: true } : s;
                    return { isOutsourced: false, hourlyRate: 1200, dailyTransport: 0, ...base };
                };
                const saved = localStorage.getItem('timecard_staff_v2');
                if (saved) return JSON.parse(saved).map(withDefaults);

                const oldSaved = localStorage.getItem('timecard_staff');
                if (oldSaved) {
                    return JSON.parse(oldSaved).map(withDefaults);
                }
                return ["草野", "田中", "小出", "高橋", "小田", "林", "山田", "市川（悠）", "谷口", "森川", "五十嵐", "市川（公）"].map(name => ({
                    name, defaultMeal: true, isOutsourced: false, hourlyRate: 1200, dailyTransport: 0
                }));
            });

            const [timeRecords, setTimeRecords] = useState(() => {
                const saved = localStorage.getItem('timecard_records');
                return saved ? JSON.parse(saved) : [];
            });

            // パスワード設定（デフォルトは 0000）
            const [adminPin, setAdminPin] = useState(() => {
                return localStorage.getItem('admin_pin') || '0000';
            });

            // GAS連携URL
            const [gasUrl, setGasUrl] = useState(() => {
                return localStorage.getItem('timecard_gas_url') || '';
            });

            // 同期ステータス
            const [syncStatus, setSyncStatus] = useState({ state: 'idle', message: '', lastSync: localStorage.getItem('timecard_last_sync') || '' });

            useEffect(() => { localStorage.setItem('timecard_staff_v2', JSON.stringify(staffList)); }, [staffList]);
            useEffect(() => { localStorage.setItem('timecard_records', JSON.stringify(timeRecords)); }, [timeRecords]);
            useEffect(() => { localStorage.setItem('admin_pin', adminPin); }, [adminPin]);
            useEffect(() => { localStorage.setItem('timecard_gas_url', gasUrl); }, [gasUrl]);

            // ===== 設定の同期（スタッフリスト、PINコード） =====
            const saveSettingsToGAS = async (newList, newPin) => {
                if (!gasUrl) return;
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ 
                            action: 'saveSettings', 
                            settings: { 
                                staffList: newList || staffList, 
                                adminPin: newPin || adminPin 
                            } 
                        })
                    });
                } catch(e) { console.error('Save settings failed', e); }
            };

            const syncSettingsFromGAS = async (url) => {
                const targetUrl = url || gasUrl;
                if (!targetUrl) return;
                try {
                    const response = await fetch(targetUrl + '?action=getSettings', { method: 'GET' });
                    if (!response.ok) return;
                    const data = await response.json();
                    if (data.status === 'ok' && data.settings) {
                        if (data.settings.staffList) {
                            // GASから取得したスタッフリストにもデフォルト値を付与（旧形式データ対応）
                            const withDefaults = (s) => {
                                const base = typeof s === 'string' ? { name: s, defaultMeal: true } : s;
                                return { isOutsourced: false, hourlyRate: 1200, dailyTransport: 0, ...base };
                            };
                            setStaffList(data.settings.staffList.map(withDefaults));
                        }
                        if (data.settings.adminPin) setAdminPin(data.settings.adminPin);
                        console.log('Settings synced from GAS');
                    } else if (data.status === 'ok' && !data.settings) {
                        // GASに設定がない場合、このデバイスのローカル設定をGASに保存する
                        const localList = JSON.parse(localStorage.getItem('timecard_staff_v2') || '[]');
                        const localPin = localStorage.getItem('admin_pin') || '0000';
                        if (localList.length > 0) {
                            fetch(targetUrl, {
                                method: 'POST', mode: 'no-cors',
                                headers: { 'Content-Type': 'text/plain' },
                                body: JSON.stringify({ action: 'saveSettings', settings: { staffList: localList, adminPin: localPin } })
                            }).then(() => console.log('Local settings pushed to GAS'));
                        }
                    }
                } catch(e) { console.error('Sync settings failed', e); }
            };

            // === clientUpdatedAt ベースの同期保護 ===
            // 全てのレコード変更時に clientUpdatedAt (ISO 8601) を付与。
            // 同期時はこのタイムスタンプで新旧を判定し、最新データを勝たせる。

            // GASへの送信関数
            const sendToGAS = async (record) => {
                if (!gasUrl) return;
                // clientUpdatedAt が無い場合は付与（安全弁）
                if (!record.clientUpdatedAt) record.clientUpdatedAt = new Date().toISOString();
                localStorage.setItem('timecard_local_update_time', Date.now().toString());
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'record', ...record })
                    });
                    // no-corsモードではレスポンスを読めない
                    const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                    const updated = pending.filter(p => p.id !== record.id);
                    localStorage.setItem('timecard_pending_sync', JSON.stringify(updated));
                } catch(e) {
                    // 送信失敗 → 未送信リストに追加
                    const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                    const existingIdx = pending.findIndex(p => p.id === record.id);
                    if (existingIdx >= 0) {
                        pending[existingIdx] = record; // 最新データで上書き
                    } else {
                        pending.push(record);
                    }
                    localStorage.setItem('timecard_pending_sync', JSON.stringify(pending));
                }
            };

            // GASからの削除関数
            const deleteFromGAS = async (recordId) => {
                if (!gasUrl) return;
                localStorage.setItem('timecard_local_update_time', Date.now().toString());

                // 未送信リストの残骸から削除（ゾンビ復活防止）
                const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                const updatedPending = pending.filter(p => p.id !== recordId);
                localStorage.setItem('timecard_pending_sync', JSON.stringify(updatedPending));

                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'delete', id: recordId })
                    });
                } catch(e) { console.error('Delete failed', e); }
            };

            // 未送信データの再送信
            const retrySendPending = async (url) => {
                const targetUrl = url || gasUrl;
                if (!targetUrl) return;
                const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                if (pending.length === 0) return;
                try {
                    await fetch(targetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'sync', records: pending })
                    });
                    localStorage.setItem('timecard_pending_sync', '[]');
                } catch(e) { /* 次回再試行 */ }
            };

            // ===== GASから全データを取得（clientUpdatedAt ベースの双方向同期）=====
            const syncFromGAS = async (url, silent) => {
                const targetUrl = url || gasUrl;
                if (!targetUrl) return { success: false, message: 'GAS URLが未設定です' };

                // ローカル更新直後5秒間は同期をスキップ（初期Race Condition対策）
                const lastUpdate = parseInt(localStorage.getItem('timecard_local_update_time') || '0');
                if (Date.now() - lastUpdate < 5000) {
                    return { success: true, count: 0, merged: [], message: 'ローカル更新直後のためスキップ' };
                }

                if (!silent) setSyncStatus(s => ({ ...s, state: 'loading', message: '同期中...' }));
                try {
                    const response = await fetch(targetUrl + '?action=getAll', { method: 'GET' });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const data = await response.json();
                    if (data.status !== 'ok') throw new Error(data.message || '不明なエラー');

                    // 通信中にローカル更新が起きた場合はスキップ
                    const checkLastUpdate = parseInt(localStorage.getItem('timecard_local_update_time') || '0');
                    if (Date.now() - checkLastUpdate < 5000) {
                        return { success: true, count: 0, merged: [], message: '通信中にローカル更新が起きたためスキップ' };
                    }

                    const gasRecords = data.records || [];

                    // 未送信リスト（ローカル優先）
                    const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                    const pendingMap = {};
                    pending.forEach(p => { pendingMap[p.id] = p; });

                    let finalMerged = [];
                    setTimeRecords(prev => {
                        // ローカルデータをMapに変換
                        const localMap = {};
                        prev.forEach(r => { localMap[r.id] = r; });

                        // クラウドデータをMapに変換
                        const cloudMap = {};
                        gasRecords.forEach(r => { cloudMap[r.id] = r; });

                        // 全IDを集める
                        const allIds = new Set([...Object.keys(localMap), ...Object.keys(cloudMap)]);
                        const merged = [];

                        allIds.forEach(id => {
                            const local = localMap[id];
                            const cloud = cloudMap[id];
                            const isPending = !!pendingMap[id];

                            if (isPending) {
                                // 未送信データはローカルを常に優先
                                merged.push(pendingMap[id]);
                            } else if (local && cloud) {
                                // 両方にある場合: clientUpdatedAt で比較
                                const localTs = local.clientUpdatedAt ? new Date(local.clientUpdatedAt).getTime() : 0;
                                const cloudTs = cloud.clientUpdatedAt ? new Date(cloud.clientUpdatedAt).getTime() : 0;
                                if (localTs > cloudTs) {
                                    merged.push(local);
                                } else {
                                    merged.push(cloud);
                                }
                            } else if (cloud) {
                                // クラウドのみ → クラウドデータを採用
                                merged.push(cloud);
                            } else if (local && local.clientUpdatedAt) {
                                // ローカルのみ（クラウドにない）
                                // clientUpdatedAt があるなら「まだ送信されていない」可能性
                                // → 送信を試みる
                                const localAge = Date.now() - new Date(local.clientUpdatedAt).getTime();
                                if (localAge < 86400000) { // 24時間以内
                                    merged.push(local);
                                    // 再送信キューに追加
                                    fetch(targetUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'record', ...local }) });
                                }
                                // 24時間以上経過 → 他デバイスで削除されたとみなし切り捨て
                            }
                            // local のみで clientUpdatedAt がない → 古い孤立データ、切り捨て
                        });

                        finalMerged = merged;
                        return merged;
                    });

                    // 同期後にローカルの未送信データも送る
                    await retrySendPending(targetUrl);

                    const now = new Date().toLocaleString('ja-JP');
                    localStorage.setItem('timecard_last_sync', now);
                    setSyncStatus({ state: 'success', message: gasRecords.length + '件を取得しました', lastSync: now });
                    return { success: true, count: gasRecords.length, merged: finalMerged };

                } catch(e) {
                    const msg = e.message || '不明なエラー';
                    setSyncStatus(s => ({ ...s, state: 'error', message: '同期失敗: ' + msg }));
                    return { success: false, message: msg };
                }
            };

            // GAS URL変更時・起動時・定期的に自動同期
            useEffect(() => {
                if (gasUrl) {
                    syncFromGAS(gasUrl, true);
                    syncSettingsFromGAS(gasUrl); // 設定情報の同期

                    const intervalId = setInterval(() => {
                        syncFromGAS(gasUrl, true);
                    }, 3000); // 3秒ごとに自動同期して他端末のラグを最小化

                    // 画面にフォーカスが戻ったときに即座に同期
                    const handleFocus = () => { syncFromGAS(gasUrl, true); syncSettingsFromGAS(gasUrl); };
                    const handleVisibility = () => {
                        if (document.visibilityState === 'visible') { syncFromGAS(gasUrl, true); syncSettingsFromGAS(gasUrl); }
                    };
                    window.addEventListener('focus', handleFocus);
                    document.addEventListener('visibilitychange', handleVisibility);

                    return () => {
                        clearInterval(intervalId);
                        window.removeEventListener('focus', handleFocus);
                        document.removeEventListener('visibilitychange', handleVisibility);
                    };
                }
            }, [gasUrl]);

            return { staffList, setStaffList, timeRecords, setTimeRecords, adminPin, setAdminPin, gasUrl, setGasUrl, sendToGAS, deleteFromGAS, syncFromGAS, saveSettingsToGAS, syncSettingsFromGAS, syncStatus };
        };

        const calculateDuration = (start, end) => {
            if (!start || !end) return 0;
            const parse = t => {
                const [h,m,s] = t.split(':').map(Number);
                return (h || 0) * 3600 + (m || 0) * 60 + (s || 0);
            };
            const diff = parse(end) - parse(start);
            return diff > 0 ? diff : 0;
        };
        
        const formatTimeHM = (t) => t ? t.substring(0, 5) : '';

        // --- 時計コンポーネント ---
        const RealtimeClock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateStr = `${time.getFullYear()}年${time.getMonth() + 1}月${time.getDate()}日 (${days[time.getDay()]})`;
            const timeStr = time.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            return (
                <div className="text-center my-4 bg-white/60 p-4 rounded-xl shadow-sm border border-secondary/20">
                    <p className="text-lg text-primary/80 font-bold">{dateStr}</p>
                    <p className="text-5xl font-bold text-primary tabular-nums tracking-widest mt-1">{timeStr}</p>
                </div>
            );
        };

        // --- モーダル: 編集・自己申請フォーム ---
        const EditRecordModal = ({ recordId, dateStr, dayOfWeek, defaultStaffName, initialRecord, onClose, onSave, isAdmin, isPaidLeaveMode }) => {
            const [clockIn, setClockIn] = useState(initialRecord?.clockIn ? formatTimeHM(initialRecord.clockIn) : '');
            const [clockOut, setClockOut] = useState(initialRecord?.clockOut ? formatTimeHM(initialRecord.clockOut) : '');
            const [breakStart, setBreakStart] = useState(initialRecord?.breakStart ? formatTimeHM(initialRecord.breakStart) : '');
            const [breakEnd, setBreakEnd] = useState(initialRecord?.breakEnd ? formatTimeHM(initialRecord.breakEnd) : '');
            const [additionalBreak, setAdditionalBreak] = useState(initialRecord?.additionalBreakMins || 0);
            const [meal, setMeal] = useState(initialRecord?.meal || false);
            const [remarks, setRemarks] = useState(initialRecord?.remarks || '');
            const [isPaidLeave, setIsPaidLeave] = useState(initialRecord?.isPaidLeave || isPaidLeaveMode);

            const handleSave = () => {
                if (isPaidLeave) {
                    const confirmLeave = window.confirm(`${dateStr} を【有給申請】で登録しますか？\n（出勤時刻などの入力内容はクリアされます）`);
                    if (!confirmLeave) return;
                } else {
                    if (!clockIn && clockOut) { alert("🚨 エラー：出勤時間が入力されていません！"); return; }
                    if (clockIn && clockOut && clockOut < clockIn) { alert("🚨 エラー：退勤時間は出勤時間より後である必要があります！"); return; }
                    if (breakStart && !breakEnd) { alert("🚨 エラー：中抜けの終了時間がありません！"); return; }
                    if (!breakStart && breakEnd) { alert("🚨 エラー：中抜けの開始時間がありません！"); return; }
                }

                const safeTimeStr = (hm) => hm ? hm + ':00' : null;
                const finalRemarks = remarks.trim();
                let systemAppendedRemarks = finalRemarks;
                
                if (!isAdmin && !isPaidLeave) {
                    if (!systemAppendedRemarks.includes('【本人修正済】')) {
                        systemAppendedRemarks += (systemAppendedRemarks ? ' ' : '') + '【本人修正済】';
                    }
                }

                let finalRecord = {
                    id: recordId, staffName: defaultStaffName, date: dateStr,
                    clockIn: isPaidLeave ? null : safeTimeStr(clockIn),
                    clockOut: isPaidLeave ? null : safeTimeStr(clockOut),
                    breakStart: isPaidLeave ? null : safeTimeStr(breakStart),
                    breakEnd: isPaidLeave ? null : safeTimeStr(breakEnd),
                    additionalBreakMins: isPaidLeave ? 0 : parseInt(additionalBreak) || 0,
                    meal: isPaidLeave ? false : meal,
                    isPaidLeave: isPaidLeave,
                    remarks: systemAppendedRemarks,
                    clientUpdatedAt: new Date().toISOString()
                };
                onSave(finalRecord);
            };

            const handleDelete = () => {
                if (window.confirm(`本当に ${dateStr} のすべての打刻データ（有給申請含む）を取り消してクリアしますか？\n（この操作は元に戻せません）`)) {
                    onSave(null);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                    <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className={`p-4 text-white flex justify-between items-center ${isPaidLeave ? 'bg-sky-500' : 'bg-primary'}`}>
                            <h3 className="font-bold text-lg flex items-center gap-2">
                                {isPaidLeave ? '🏖 有給申請' : '✏️ 打刻データの修正'}
                            </h3>
                            <button onClick={onClose} className="hover:bg-black/20 p-1 rounded-full transition-colors"><CloseIcon /></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto flex-1">
                            <div className="text-center font-bold text-xl mb-4 border-b-2 border-primary/10 pb-2">
                                {dateStr} ({dayOfWeek})
                            </div>
                            
                            <label className={`block border-2 rounded-xl p-3 mb-6 cursor-pointer transition-colors ${isPaidLeave ? 'border-sky-500 bg-sky-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                <div className="flex items-center justify-between">
                                    <span className={`font-bold text-lg ${isPaidLeave ? 'text-sky-600' : 'text-gray-500'}`}>🏖 この日を有給申請にする</span>
                                    <input type="checkbox" checked={isPaidLeave} onChange={(e) => setIsPaidLeave(e.target.checked)} className="w-6 h-6 border-2 accent-sky-500" />
                                </div>
                                {isPaidLeave && <p className="text-xs text-sky-600 mt-2">※出力時に「有給申請」として自動記録されます。</p>}
                            </label>

                            {!isPaidLeave && (
                                <div className="space-y-4 animate-fade-in">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-primary mb-1">出勤</label>
                                            <input type="time" value={clockIn} onChange={(e) => setClockIn(e.target.value)} className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-primary mb-1">退勤</label>
                                            <input type="time" value={clockOut} onChange={(e) => setClockOut(e.target.value)} className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 bg-surface p-3 rounded-xl border border-primary/10">
                                        <div>
                                            <label className="block text-xs font-bold text-primary/70 mb-1">中抜け開始</label>
                                            <input type="time" value={breakStart} onChange={(e) => setBreakStart(e.target.value)} className="w-full border border-primary/20 rounded-lg p-2 font-bold focus:border-secondary focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-primary/70 mb-1">中抜け終了</label>
                                            <input type="time" value={breakEnd} onChange={(e) => setBreakEnd(e.target.value)} className="w-full border border-primary/20 rounded-lg p-2 font-bold focus:border-secondary focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 items-end">
                                        <div className="flex-1">
                                            <label className="block text-xs font-bold text-primary mb-1">追加の休憩（分）</label>
                                            <input type="number" value={additionalBreak} onChange={(e) => setAdditionalBreak(e.target.value)} min="0" className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                        <label className="flex-1 flex items-center justify-center space-x-2 cursor-pointer border-2 border-primary/20 rounded-xl p-2 hover:bg-surface transition-colors">
                                            <input type="checkbox" checked={meal} onChange={(e) => setMeal(e.target.checked)} className="w-5 h-5 accent-secondary" />
                                            <span className="font-bold text-primary">🥗 賄い</span>
                                        </label>
                                    </div>
                                </div>
                            )}

                            <div className="mt-4">
                                <label className="block text-xs font-bold text-primary mb-1">備考</label>
                                <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} rows="3" placeholder="コメントや申請理由など..." className="w-full border-2 border-primary/20 rounded-xl p-2 text-sm focus:border-secondary focus:outline-none resize-none"></textarea>
                                {!isAdmin && !isPaidLeave && (
                                    <div className="mt-2 p-2 bg-amber-50 rounded text-xs text-amber-700 font-bold border border-amber-200">
                                        ⚠️ 保存した場合、日付の備考欄に「本人修正済」と記録が残ります。
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="p-4 border-t-2 border-primary/10 bg-gray-50 flex justify-between gap-3">
                            <button onClick={handleDelete} className="px-4 py-3 text-sm font-bold text-danger hover:bg-danger/10 rounded-xl transition-colors">
                                完全取消
                            </button>
                            <div className="flex gap-2 w-full justify-end">
                                <button onClick={onClose} className="px-5 py-3 text-sm font-bold text-primary bg-white border-2 border-primary/20 rounded-xl hover:bg-gray-100 transition-colors">
                                    キャンセル
                                </button>
                                <button onClick={handleSave} className="px-6 py-3 text-sm font-bold text-white bg-primary rounded-xl hover:bg-primary/90 transition-colors shadow-md">
                                    保存する
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- カレンダー・履歴マネージャー ---
        const MonthlyTimeEditor = ({ staffName, isAdmin, timeRecords, setTimeRecords, sendToGAS, deleteFromGAS, onBack }) => {
            const [selectedMonth, setSelectedMonth] = useState(() => {
                const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [editModalData, setEditModalData] = useState(null);

            const [yearStr, monthStr] = selectedMonth.split('-');
            const year = parseInt(yearStr);
            const month = parseInt(monthStr);
            const daysInMonth = new Date(year, month, 0).getDate();

            const handleSaveRecord = (newRecord) => {
                const recordId = editModalData.recordId;
                if (newRecord === null) {
                    setTimeRecords(prev => prev.filter(r => r.id !== recordId));
                    if (deleteFromGAS) deleteFromGAS(recordId);
                } else {
                    setTimeRecords(prev => [...prev.filter(r => r.id !== recordId), newRecord]);
                    if (sendToGAS) sendToGAS(newRecord);
                }
                setEditModalData(null);
            };

            const renderTableRows = () => {
                const rows = [];
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month - 1, d);
                    const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][dateObj.getDay()];
                    const rowBgClass = dateObj.getDay() === 0 ? 'bg-red-50' : dateObj.getDay() === 6 ? 'bg-blue-50' : 'bg-white hover:bg-surface transition-colors cursor-pointer';

                    const dateStrLong = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const recordId = `${staffName}_${dateStrLong}`;
                    const record = timeRecords.find(r => r.id === recordId);

                    rows.push(
                        <tr key={d} className={`border-b border-primary/10 ${rowBgClass}`} onClick={() => setEditModalData({ recordId, dateStr: dateStrLong, dayOfWeek, record, isPaidLeaveMode: false })}>
                            <td className="p-3 text-center border-r border-primary/10 font-bold whitespace-nowrap">
                                {d} <span className="text-xs text-gray-500">({dayOfWeek})</span>
                            </td>
                            {record ? (
                                record.isPaidLeave ? (
                                    <>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-2 text-center text-sm font-bold text-sky-600 truncate max-w-[100px]" title={record.remarks}>
                                            【有給申請】 {record.remarks}
                                        </td>
                                        <td className="p-2 text-center">
                                            <button className="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">修正</button>
                                        </td>
                                    </>
                                ) : (
                                    <>
                                        <td className="p-3 text-center font-bold text-primary">{formatTimeHM(record.clockIn) || '-'}</td>
                                        <td className="p-3 text-center font-bold text-[#b45309]">{formatTimeHM(record.clockOut) || '-'}</td>
                                        <td className="p-3 text-center text-xs text-primary/70">
                                            {formatTimeHM(record.breakStart)}〜{formatTimeHM(record.breakEnd)}
                                            {record.additionalBreakMins > 0 && <span className="block text-[10px] text-accent">追:{record.additionalBreakMins}分</span>}
                                        </td>
                                        <td className="p-3 text-center">{record.meal ? '🥗' : '-'}</td>
                                        <td className="p-2 text-xs truncate max-w-[100px] text-gray-500 relative">
                                            {record.remarks?.includes('【本人修正済】') ? (
                                                <span className="bg-amber-100 text-amber-700 px-1 py-0.5 rounded text-[10px] font-bold inline-block mr-1" title={record.remarks}>修正済</span>
                                            ) : ''}
                                            {record.remarks?.replace('【本人修正済】', '').trim() || '-'}
                                        </td>
                                        <td className="p-2 text-center">
                                            <button className="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">修正</button>
                                        </td>
                                    </>
                                )
                            ) : (
                                <>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-2 text-center opacity-0 group-hover:opacity-100 transition-opacity" style={{opacity: 1}}>
                                        <div className="flex gap-1 justify-center">
                                            {!isAdmin && (
                                                <button onClick={(e) => { e.stopPropagation(); setEditModalData({ recordId, dateStr: dateStrLong, dayOfWeek, record: null, isPaidLeaveMode: true }); }} className="text-xs bg-sky-50 shadow-sm text-sky-600 font-bold py-1 px-2 rounded-lg hover:bg-sky-100 whitespace-nowrap border border-sky-200">有給</button>
                                            )}
                                            <button className="text-xs bg-white border border-primary/20 shadow-sm text-primary font-bold py-1 px-2 rounded-lg hover:bg-surface whitespace-nowrap">新規・修正</button>
                                        </div>
                                    </td>
                                </>
                            )}
                        </tr>
                    );
                }
                return rows;
            };

            return (
                <div className="animate-fade-in space-y-4 w-full text-left relative z-10">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="text-sm border-2 border-primary/20 bg-white hover:bg-gray-50 font-bold px-4 py-2 rounded-xl text-primary transition-colors flex items-center gap-1 shadow-sm">
                            ← {isAdmin ? '管理者メニューへ戻る' : '打刻画面へ戻る'}
                        </button>
                        <h2 className="text-xl font-bold text-primary flex items-center gap-1">
                            {isAdmin ? '🔧' : '📊'} 履歴・修正
                        </h2>
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-2 border-primary/20 shadow-sm">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <div className="flex-1">
                                <p className="text-sm font-bold text-primary/60 mb-1">対象スタッフ</p>
                                <p className="text-2xl font-bold text-primary">{staffName} さん</p>
                            </div>
                            <div>
                                <input 
                                    type="month" 
                                    value={selectedMonth}
                                    onChange={(e) => setSelectedMonth(e.target.value)}
                                    className="border-2 border-primary/30 text-lg p-2 rounded-xl font-bold focus:border-secondary focus:outline-none bg-surface"
                                />
                            </div>
                        </div>

                        {!isAdmin && (
                            <div className="mb-4 bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs text-amber-800 font-bold">
                                💡 出勤・退勤の押し忘れ等は、カレンダーの行をタップ（クリック）して自分で修正できます。<br/>
                                🏖 「有給」を申請する場合は、空いている日をタップして「🏖 有給」を押してください。
                            </div>
                        )}

                        <div className="overflow-x-auto rounded-xl border-2 border-primary/10 shadow-inner max-h-[60vh] overflow-y-auto w-full">
                            <table className="w-full text-left border-collapse" style={{ minWidth: '700px' }}>
                                <thead className="bg-primary/5 sticky top-0 z-10 shadow-sm">
                                    <tr>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-24">日付</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-20">出勤</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-20">退勤</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-24">中抜け・休憩</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-16">賄い</th>
                                        <th className="p-3 font-bold text-sm text-primary whitespace-nowrap max-w-[150px]">備考・ログ</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-32">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {renderTableRows()}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {editModalData && (
                        <EditRecordModal 
                            recordId={editModalData.recordId}
                            dateStr={editModalData.dateStr}
                            dayOfWeek={editModalData.dayOfWeek}
                            defaultStaffName={staffName}
                            initialRecord={editModalData.record}
                            isAdmin={isAdmin}
                            isPaidLeaveMode={editModalData.isPaidLeaveMode}
                            onClose={() => setEditModalData(null)}
                            onSave={handleSaveRecord}
                        />
                    )}
                </div>
            );
        };

        // --- 管理者ダッシュボードコンポーネント ---
        const AdminDashboard = ({ 
            staffList, setStaffList, 
            timeRecords, setTimeRecords, 
            adminPin, setAdminPin,
            gasUrl, setGasUrl,
            syncFromGAS, saveSettingsToGAS, syncStatus,
            openAdminHistoryView 
        }) => {
            const [targetMonth, setTargetMonth] = useState(() => {
                const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [newStaffName, setNewStaffName] = useState('');
            // fileInputRef は不要になりました（テンプレート埋め込み済み）

            const handleAddStaff = () => {
                if (newStaffName && !staffList.find(s => s.name === newStaffName)) {
                    const newList = [...staffList, { name: newStaffName, defaultMeal: true, isOutsourced: false, hourlyRate: 1200, dailyTransport: 0 }];
                    setStaffList(newList);
                    saveSettingsToGAS(newList, adminPin);
                    setNewStaffName('');
                } else if(staffList.find(s => s.name === newStaffName)) {
                    alert('すでに同じ名前のスタッフがいます。');
                }
            };

            const toggleMealSetting = (name) => {
                const newList = staffList.map(s => s.name === name ? { ...s, defaultMeal: !s.defaultMeal } : s);
                setStaffList(newList);
                saveSettingsToGAS(newList, adminPin);
            };
            const toggleOutsourced = (name) => {
                const newList = staffList.map(s => s.name === name ? { ...s, isOutsourced: !s.isOutsourced } : s);
                setStaffList(newList);
                saveSettingsToGAS(newList, adminPin);
            };
            // debounce用タイマーRef（時給・交通費の入力で1文字ごとにGAS送信されるのを防止）
            const settingsSaveTimerRef = useRef(null);
            const debouncedSaveSettingsToGAS = (newList, pin) => {
                if (settingsSaveTimerRef.current) clearTimeout(settingsSaveTimerRef.current);
                settingsSaveTimerRef.current = setTimeout(() => {
                    saveSettingsToGAS(newList, pin);
                }, 500);
            };
            const updateHourlyRate = (name, val) => {
                const newList = staffList.map(s => s.name === name ? { ...s, hourlyRate: parseInt(val) || 0 } : s);
                setStaffList(newList);
                debouncedSaveSettingsToGAS(newList, adminPin);
            };
            const updateDailyTransport = (name, val) => {
                const newList = staffList.map(s => s.name === name ? { ...s, dailyTransport: parseInt(val) || 0 } : s);
                setStaffList(newList);
                debouncedSaveSettingsToGAS(newList, adminPin);
            };
            const handleRemoveStaff = (name) => {
                if (window.confirm(`${name}さんを削除しますか？\n（過去の打刻データは消えませんが、プルダウンに表示されなくなります）`)) {
                    const newList = staffList.filter(s => s.name !== name);
                    setStaffList(newList);
                    saveSettingsToGAS(newList, adminPin);
                }
            };
            
            const handleUpdatePin = () => {
                const newPin = window.prompt("新しい管理者用パスワード（4桁の数字）を入力してください：\n（忘れないようにご注意ください）");
                if (newPin) {
                    if (newPin.length !== 4 || isNaN(newPin)) {
                        alert("パスワードは4桁の半角数字で入力してください。");
                    } else {
                        setAdminPin(newPin);
                        saveSettingsToGAS(staffList, newPin);
                        alert(`パスワードを ${newPin} に変更しました。`);
                    }
                }
            };

            const handleExportWithTemplate = async () => {
                try {
                    const [yearStr, monthStr] = targetMonth.split('-');
                    const year = parseInt(yearStr);
                    const month = parseInt(monthStr);

                    const workbook = new ExcelJS.Workbook();

                    // Base64テンプレートをデコードしてバッファに変換
                    const b64 = EXCEL_TEMPLATE_B64;
                    const binaryStr = atob(b64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    const buffer = bytes.buffer;
                    await workbook.xlsx.load(buffer);

                    const daysInMonth = new Date(year, month, 0).getDate();
                    const timeToExcelFraction = (timeStr) => {
                        if (!timeStr) return null;
                        const parts = timeStr.split(':');
                        const h = parseInt(parts[0], 10) || 0;
                        const m = parseInt(parts[1], 10) || 0;
                        const s = parseInt(parts[2], 10) || 0;
                        return (h * 3600 + m * 60 + s) / 86400;
                    };

                    // ステップ1: 全シートの日付・曜日・データセルを対象月に書き換え
                    workbook.eachSheet((ws) => {
                        // ヘッダー行を探す（「出勤」「退勤」「曜日」を含む行）
                        let startRow = -1;
                        ws.eachRow((row, rowNumber) => {
                            if (startRow !== -1) return;
                            let isHeader = false;
                            row.eachCell((cell) => {
                                const v = cell.value;
                                if (typeof v === 'string' && (v.includes('出勤') || v.includes('曜日') || v.includes('退勤'))) {
                                    isHeader = true;
                                }
                            });
                            if (isHeader) startRow = rowNumber + 1;
                        });
                        // ヘッダーが見つからない場合はデータ行を自動検出
                        if (startRow === -1) {
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date || (typeof cellA === 'number' && cellA > 40000)) {
                                    startRow = rowNumber;
                                }
                            });
                        }
                        if (startRow === -1) return; // データ行が見つからないシートはスキップ

                        for (let d = 1; d <= 31; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            // 全書き込み対象セルをクリア
                            [1,2,3,4,5,6,7,16].forEach(c => { row.getCell(c).value = null; });

                            if (d <= daysInMonth) {
                                const targetDateObj = new Date(year, month - 1, d);
                                const dateVal = new Date(Date.UTC(year, month - 1, d, 12, 0, 0));
                                row.getCell(1).value = dateVal;
                                row.getCell(1).numFmt = 'yyyy/m/d';
                                row.getCell(2).value = ['日', '月', '火', '水', '木', '金', '土'][targetDateObj.getDay()];
                            }
                        }
                    });

                    // ステップ2: staffListに登録されたスタッフのシートに勤怠データを書き込み
                    staffList.filter(s => !s.isOutsourced).forEach(staff => {
                        const ws = workbook.getWorksheet(staff.name);
                        if (!ws) return;

                        let startRow = -1;
                        ws.eachRow((row, rowNumber) => {
                            if (startRow !== -1) return;
                            let isHeader = false;
                            row.eachCell((cell) => {
                                const v = cell.value;
                                if (typeof v === 'string' && (v.includes('出勤') || v.includes('曜日') || v.includes('退勤'))) {
                                    isHeader = true;
                                }
                            });
                            if (isHeader) startRow = rowNumber + 1;
                        });
                        if (startRow === -1) {
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date) startRow = rowNumber;
                            });
                        }
                        if (startRow === -1) startRow = 2;

                        for (let d = 1; d <= daysInMonth; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            const targetDateStrShort = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const record = timeRecords.find(r => r.id === `${staff.name}_${targetDateStrShort}`);

                            if (record) {
                                if (record.isPaidLeave) {
                                    row.getCell(16).value = '【有給申請】 ' + (record.remarks || '');
                                } else {
                                    row.getCell(3).value = timeToExcelFraction(record.clockIn);
                                    row.getCell(6).value = timeToExcelFraction(record.clockOut);
                                    row.getCell(7).value = record.meal ? 1 : null;

                                    let remarks = record.remarks || '';
                                    if (record.additionalBreakMins > 0) {
                                        if (!record.breakStart && !record.breakEnd) {
                                            row.getCell(4).value = timeToExcelFraction('12:00:00');
                                            const endH = 12 + Math.floor(record.additionalBreakMins / 60);
                                            const endM = record.additionalBreakMins % 60;
                                            row.getCell(5).value = timeToExcelFraction(`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}:00`);
                                        } else {
                                            row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                            row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                            remarks += (remarks ? ' / ' : '') + `追加個別休憩：${record.additionalBreakMins}分`;
                                        }
                                    } else {
                                        row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                        row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                    }
                                    row.getCell(16).value = remarks || null;
                                }
                            }
                        }
                    });

                    // ステップ3: 対象月に出勤記録がないスタッフのシートを削除
                    // マスタシートは常に残す
                    const sheetsToRemove = [];
                    workbook.eachSheet((ws) => {
                        const sheetName = ws.name;
                        if (sheetName === 'マスタ') return; // マスタは残す

                        // このシートのスタッフに対象月のレコードがあるか確認
                        let hasRecord = false;
                        for (let d = 1; d <= daysInMonth; d++) {
                            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const record = timeRecords.find(r => r.id === `${sheetName}_${dateStr}`);
                            if (record) {
                                hasRecord = true;
                                break;
                            }
                        }
                        if (!hasRecord) sheetsToRemove.push(sheetName);
                    });

                    // シートを削除（逆順で削除して安全に処理）
                    sheetsToRemove.forEach(name => {
                        const ws = workbook.getWorksheet(name);
                        if (ws) workbook.removeWorksheet(ws.id);
                    });

                    const outBuffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([outBuffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                    
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `タイムカード入力_${year}${String(month).padStart(2, '0')}給与分_アプリ出力.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    alert('出力に成功しました！');
                } catch (error) {
                    console.error(error);
                    alert("出力中にエラーが発生しました。");
                }
            };

            // ===== 外注者専用エクセル出力（給与計算付き）=====
            const handleExportOutsourced = async () => {
                try {
                    const outsourcedStaff = staffList.filter(s => s.isOutsourced);
                    if (outsourcedStaff.length === 0) {
                        alert('外注者が設定されていません。スタッフ設定で「外注者」をONにしてください。');
                        return;
                    }

                    const [yearStr, monthStr] = targetMonth.split('-');
                    const year = parseInt(yearStr);
                    const month = parseInt(monthStr);
                    const daysInMonth = new Date(year, month, 0).getDate();

                    // ===== 通常テンプレートと同じ処理でロード =====
                    const timeToExcelFraction = (timeStr) => {
                        if (!timeStr) return null;
                        const parts = timeStr.split(':');
                        const h = parseInt(parts[0], 10) || 0;
                        const m = parseInt(parts[1], 10) || 0;
                        const s = parseInt(parts[2], 10) || 0;
                        return (h * 3600 + m * 60 + s) / 86400;
                    };

                    const workbook = new ExcelJS.Workbook();
                    const b64 = EXCEL_TEMPLATE_B64;
                    const binaryStr = atob(b64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                    await workbook.xlsx.load(bytes.buffer);

                    // ステップ1: 全シートの日付・曜日を対象月に更新（通常出力と同じ）
                    const findStartRow = (ws) => {
                        let startRow = -1;
                        ws.eachRow((row, rowNumber) => {
                            if (startRow !== -1) return;
                            let isHeader = false;
                            row.eachCell((cell) => {
                                const v = cell.value;
                                if (typeof v === 'string' && (v.includes('出勤') || v.includes('曜日') || v.includes('退勤'))) isHeader = true;
                            });
                            if (isHeader) startRow = rowNumber + 1;
                        });
                        if (startRow === -1) {
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date || (typeof cellA === 'number' && cellA > 40000)) startRow = rowNumber;
                            });
                        }
                        return startRow;
                    };

                    workbook.eachSheet((ws) => {
                        const startRow = findStartRow(ws);
                        if (startRow === -1) return;
                        for (let d = 1; d <= 31; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            [1,2,3,4,5,6,7,16].forEach(c => { row.getCell(c).value = null; });
                            if (d <= daysInMonth) {
                                const targetDateObj = new Date(year, month - 1, d);
                                const dateVal = new Date(Date.UTC(year, month - 1, d, 12, 0, 0));
                                row.getCell(1).value = dateVal;
                                row.getCell(1).numFmt = 'yyyy/m/d';
                                row.getCell(2).value = ['日','月','火','水','木','金','土'][targetDateObj.getDay()];
                            }
                        }
                    });

                    // ステップ2: 外注者のデータを書き込み（賄いは書かない）
                    const outsourcedPayData = {};
                    outsourcedStaff.forEach(staff => {
                        const ws = workbook.getWorksheet(staff.name);
                        if (!ws) return;

                        const startRow = findStartRow(ws);
                        if (startRow === -1) return;

                        let totalDays = 0, totalCalcFrac = 0;

                        for (let d = 1; d <= daysInMonth; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            const dateStrShort = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                            const record = timeRecords.find(r => r.id === `${staff.name}_${dateStrShort}`);
                            if (!record) continue;

                            if (record.isPaidLeave) {
                                row.getCell(16).value = '【有給申請】 ' + (record.remarks || '');
                            } else {
                                row.getCell(3).value = timeToExcelFraction(record.clockIn);
                                row.getCell(6).value = timeToExcelFraction(record.clockOut);
                                // 賄い（col 7）は外注者なので書かない

                                let remarks = record.remarks || '';
                                if (record.additionalBreakMins > 0) {
                                    if (!record.breakStart && !record.breakEnd) {
                                        row.getCell(4).value = timeToExcelFraction('12:00:00');
                                        const endH = 12 + Math.floor(record.additionalBreakMins / 60);
                                        const endM = record.additionalBreakMins % 60;
                                        row.getCell(5).value = timeToExcelFraction(`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}:00`);
                                    } else {
                                        row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                        row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                        remarks += (remarks ? ' / ' : '') + `追加個別休憩：${record.additionalBreakMins}分`;
                                    }
                                } else {
                                    row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                    row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                }
                                row.getCell(16).value = remarks || null;

                                if (record.clockIn && record.clockOut) {
                                    const ci = timeToExcelFraction(record.clockIn);
                                    const co = timeToExcelFraction(record.clockOut);
                                    const bs = timeToExcelFraction(record.breakStart);
                                    const be = timeToExcelFraction(record.breakEnd);
                                    let workFrac = co - ci;
                                    if (workFrac < 0) workFrac += 1;
                                    if (bs && be) workFrac -= (be - bs);
                                    const breakDeduct = workFrac > (6 / 24) ? (30 / 1440) : 0;
                                    totalCalcFrac += Math.max(0, workFrac - breakDeduct);
                                    totalDays++;
                                }
                            }
                        }

                        // 給与計算ブロックをデータ行の下に追加
                        const hourlyRate = staff.hourlyRate || 1200;
                        const dailyTransport = staff.dailyTransport || 0;
                        const totalH = Math.round(totalCalcFrac * 24 * 100) / 100;
                        const remuneration = Math.round(totalH * hourlyRate);
                        const transportTotal = dailyTransport * totalDays;
                        const totalBill = remuneration + transportTotal;
                        const moneyFmt = '#,##0"円"';
                        const blockStart = startRow + 33; // データ31行＋バッファ

                        const labelFont = { bold: true };
                        const bgPay = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF3E0' } };
                        const bgBill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFCE4EC' } };

                        const setPayRow = (offset, label, value, fmt, note, isBig) => {
                            const r = ws.getRow(blockStart + offset);
                            r.getCell(3).value = label; r.getCell(3).font = labelFont; r.getCell(3).fill = bgPay;
                            r.getCell(4).value = value;
                            if (fmt) r.getCell(4).numFmt = fmt;
                            if (isBig) r.getCell(4).font = { bold: true, size: 12 };
                            r.getCell(4).fill = isBig ? bgBill : bgPay;
                            if (note) { r.getCell(5).value = note; r.getCell(5).fill = bgPay; }
                        };

                        ws.getRow(blockStart).getCell(3).value = '【給与計算】';
                        ws.getRow(blockStart).getCell(3).font = { bold: true, size: 11 };
                        setPayRow(1, '勤務時間合計', totalH + ' 時間', null, `(${totalDays}日出勤)`, false);
                        setPayRow(2, '時給', hourlyRate, moneyFmt, null, false);
                        setPayRow(3, '1日交通費', dailyTransport, moneyFmt, null, false);
                        setPayRow(4, '報酬', remuneration, moneyFmt, `${totalH}時間 × ${hourlyRate.toLocaleString()}円`, false);
                        setPayRow(5, '交通費合計', transportTotal, moneyFmt, `${dailyTransport.toLocaleString()}円 × ${totalDays}日`, false);
                        setPayRow(6, '請求合計', totalBill, moneyFmt, null, true);

                        outsourcedPayData[staff.name] = true;
                    });

                    // ステップ3: 外注者以外のシートを削除
                    const outsourcedNames = new Set(outsourcedStaff.map(s => s.name));
                    const sheetsToRemove = [];
                    workbook.eachSheet((ws) => {
                        if (ws.name === 'マスタ') return;
                        if (!outsourcedNames.has(ws.name)) {
                            sheetsToRemove.push(ws.name);
                            return;
                        }
                        // 外注者でもデータがなければ削除
                        if (!outsourcedPayData[ws.name]) sheetsToRemove.push(ws.name);
                    });
                    sheetsToRemove.forEach(name => {
                        const ws = workbook.getWorksheet(name);
                        if (ws) workbook.removeWorksheet(ws.id);
                    });

                    if (workbook.worksheets.length === 0) {
                        alert('外注者のシートがテンプレート内に見つかりませんでした。\nスタッフ名がテンプレートのシート名と完全一致しているか確認してください。');
                        return;
                    }

                    const outBuffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([outBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `外注タイムカード_${year}${String(month).padStart(2,'0')}給与分.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    alert('外注者エクセルを出力しました！');
                } catch (error) {
                    console.error(error);
                    alert('外注者エクセルの出力中にエラーが発生しました。\n' + error.message);
                }
            };

            return (
                <div className="animate-fade-in space-y-8 text-left w-full relative z-10">
                    <div className="border-b-2 border-primary/20 pb-4 mb-6 flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-primary flex items-center gap-2">
                            <SettingsIcon /> 管理者メニュー
                        </h2>
                        <button onClick={handleUpdatePin} className="text-xs bg-surface border border-primary/20 text-primary font-bold px-3 py-1.5 rounded-lg hover:bg-white shadow-sm">
                            🔑 パスワード変更
                        </button>
                    </div>
                    
                    <div className="p-6 bg-surface rounded-2xl border-2 border-secondary/30 shadow-sm relative overflow-hidden">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2 relative z-10">
                            🌿 月次エクセル出力
                        </h3>
                        <p className="text-sm text-primary/80 mb-4 font-medium">対象月を選んでボタンを押すだけで出力できます。</p>
                        
                        <div className="flex flex-col gap-4">
                            <div>
                                <label className="block text-sm font-bold text-primary mb-2">出力したい対象月</label>
                                <input type="month" value={targetMonth} onChange={(e) => setTargetMonth(e.target.value)} className="border-2 border-primary/30 text-lg p-2 rounded-xl focus:border-secondary font-bold text-primary bg-white" />
                            </div>
                            <button onClick={handleExportWithTemplate} className="w-full bg-gradient-to-r from-secondary to-[#65a30d] hover:brightness-110 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-all active:scale-95 text-lg border-b-4 border-[#4d7c0f] flex items-center justify-center gap-2">
                                📥 エクセルファイルを出力する
                            </button>
                            {staffList.some(s => s.isOutsourced) && (
                                <button onClick={handleExportOutsourced} className="w-full bg-gradient-to-r from-orange-400 to-orange-500 hover:brightness-110 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-all active:scale-95 text-lg border-b-4 border-orange-600 flex items-center justify-center gap-2">
                                    📋 外注者エクセルを出力する（給与計算付き）
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="p-6 bg-blue-50 rounded-2xl border-2 border-blue-200 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            ☁️ クラウド双方向同期設定（Googleスプレッドシート連携）
                        </h3>
                        <p className="text-sm text-primary/70 mb-3">Google Apps Scriptのデプロイ後に表示されるURLを入力してください。</p>
                        <div className="flex gap-2 mb-3">
                            <input type="url" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} placeholder="https://script.google.com/macros/s/xxxxx/exec" className="flex-1 border-2 border-blue-300 p-3 rounded-xl focus:border-blue-500 text-sm bg-white" />
                        </div>
                        <div className="flex flex-wrap items-center gap-2 mb-3">
                            <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold ${gasUrl ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                {gasUrl ? '✅ 連携ON' : '⏸ 未設定'}
                            </span>
                            {gasUrl && <button onClick={async () => { try { const r = await fetch(gasUrl); const j = await r.json(); alert(j.message || '接続成功！'); } catch(e) { alert('接続テスト失敗: ' + e.message + '\n\n※初回はGASのアクセス許可が必要です。'); } }} className="px-4 py-1.5 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg text-xs transition-colors">🔗 接続テスト</button>}
                            {gasUrl && <button onClick={async () => { const result = await syncFromGAS(); if (result.success) alert('✅ 同期完了！' + result.count + '件のデータを取得しました。'); else alert('❌ 同期失敗: ' + result.message + '\n\nGASの再デプロイが必要な場合があります。手順書をご確認ください。'); }} disabled={syncStatus.state === 'loading'} className="px-4 py-1.5 bg-teal-500 hover:bg-teal-600 disabled:opacity-50 text-white font-bold rounded-lg text-xs transition-colors flex items-center gap-1">{syncStatus.state === 'loading' ? '⏳ 同期中...' : '🔄 今すぐ全データ同期'}</button>}
                        </div>
                        {gasUrl && syncStatus.lastSync && (
                            <div className={`text-xs font-bold px-3 py-2 rounded-lg mb-2 ${
                                syncStatus.state === 'error' ? 'bg-red-50 text-red-600' :
                                syncStatus.state === 'loading' ? 'bg-blue-50 text-blue-600' :
                                'bg-green-50 text-green-700'
                            }`}>
                                {syncStatus.state === 'loading' ? '⏳ 同期中...' :
                                 syncStatus.state === 'error' ? '❌ ' + syncStatus.message :
                                 '✅ 最終同期: ' + syncStatus.lastSync}
                            </div>
                        )}
                        <p className="text-xs text-primary/50 mt-1">※ アプリ起動時に自動同期。すべての打刻がGASを介して全デバイスで共有されます。</p>
                        <p className="text-xs text-orange-600 font-bold mt-1">⚠️ GASを更新した場合は「新しいデプロイ」が必要です。既存URLと異なるURLが発行されたら、こちらを更新してください。</p>
                    </div>

                    <div className="p-6 bg-white rounded-2xl border-2 border-primary/20 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            📝 マスターデータの手動編集
                        </h3>
                        <div className="flex gap-2 mb-2 flex-wrap">
                            {staffList.map(staff => (
                                <button key={staff.name} onClick={() => openAdminHistoryView(staff.name)} className="px-4 py-2 bg-purple-50 hover:bg-purple-100 text-purple-700 font-bold border-2 border-purple-200 rounded-xl transition-colors whitespace-nowrap">
                                    {staff.name} さん
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="p-6 bg-white rounded-2xl border-2 border-primary/20 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            👥 スタッフ打刻リスト＆賄い設定
                        </h3>
                        <div className="flex gap-2 mb-6">
                            <input type="text" value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} placeholder="新しいスタッフ名" className="flex-1 border-2 border-primary/20 p-3 rounded-xl focus:border-secondary text-md" onKeyPress={e => e.key === 'Enter' && handleAddStaff()} />
                            <button onClick={handleAddStaff} disabled={!newStaffName} className="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl disabled:opacity-50 transition-colors">追加</button>
                        </div>

                        <div className="bg-surface rounded-xl border border-primary/20 overflow-hidden">
                            <ul className="divide-y divide-primary/10 max-h-96 overflow-y-auto w-full">
                                {staffList.map(staff => (
                                    <li key={staff.name} className="bg-white transition-colors">
                                        <div className="p-3 flex items-center gap-2">
                                            <span className="font-bold text-primary text-base flex-1 truncate">{staff.name}</span>
                                            <button onClick={() => toggleMealSetting(staff.name)} className={`px-3 py-1 rounded-full text-xs font-bold transition-colors whitespace-nowrap ${staff.defaultMeal ? 'bg-secondary text-white' : 'bg-gray-200 text-gray-500'}`}>{staff.defaultMeal ? '賄いあり' : '賄いなし'}</button>
                                            <button onClick={() => toggleOutsourced(staff.name)} className={`px-3 py-1 rounded-full text-xs font-bold transition-colors whitespace-nowrap border-2 ${staff.isOutsourced ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-gray-400 border-gray-300'}`}>外注者</button>
                                            <button onClick={() => handleRemoveStaff(staff.name)} className="text-white hover:bg-red-700 bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors whitespace-nowrap">削除</button>
                                        </div>
                                        {staff.isOutsourced && (
                                            <div className="px-4 pb-3 flex flex-wrap gap-3 items-center border-t border-orange-100 bg-orange-50">
                                                <span className="text-xs font-bold text-orange-700 mt-2">💼 外注者設定</span>
                                                <div className="flex items-center gap-1 mt-2">
                                                    <label className="text-xs font-bold text-orange-700 whitespace-nowrap">時給</label>
                                                    <input type="number" min="0" value={staff.hourlyRate ?? 1200} onChange={(e) => updateHourlyRate(staff.name, e.target.value)} className="w-20 border-2 border-orange-300 rounded-lg p-1 text-sm text-right focus:border-orange-500 focus:outline-none bg-white" />
                                                    <span className="text-xs text-gray-600">円</span>
                                                </div>
                                                <div className="flex items-center gap-1 mt-2">
                                                    <label className="text-xs font-bold text-orange-700 whitespace-nowrap">交通費(1日)</label>
                                                    <input type="number" min="0" value={staff.dailyTransport ?? 0} onChange={(e) => updateDailyTransport(staff.name, e.target.value)} className="w-20 border-2 border-orange-300 rounded-lg p-1 text-sm text-right focus:border-orange-500 focus:outline-none bg-white" />
                                                    <span className="text-xs text-gray-600">円</span>
                                                </div>
                                            </div>
                                        )}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // --- メインアプリ ---
        const App = () => {
            const { staffList, setStaffList, timeRecords, setTimeRecords, adminPin, setAdminPin, gasUrl, setGasUrl, sendToGAS, deleteFromGAS, syncFromGAS, saveSettingsToGAS, syncSettingsFromGAS, syncStatus } = useAppData();
            const [view, setView] = useState('punch'); 
            
            const [selectedStaffName, setSelectedStaffName] = useState('');
            const [remarks, setRemarks] = useState('');
            const [hasMeal, setHasMeal] = useState(false);

            const [historyStaffName, setHistoryStaffName] = useState('');
            const [historyIsAdminMode, setHistoryIsAdminMode] = useState(false);
            
            const handleAdminClick = () => {
                if (view === 'punch') {
                    const input = window.prompt("🔑 管理者用パスワード（4桁の数字）を入力してください。");
                    if (input === null) return;
                    if (input === adminPin) {
                        changeView('admin');
                    } else {
                        alert("パスワードが違います。");
                    }
                } else {
                    changeView('punch');
                }
            };

            const handlePunch = (type) => {
                if (!selectedStaffName) return;

                const now = new Date();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + ':00';
                const recordId = `${selectedStaffName}_${dateStr}`;
                
                let additionalBreakPromptMins = 0;
                const existingRec = timeRecords.find(r => r.id === recordId);
                
                if (existingRec?.isPaidLeave && type !== 'update_info') {
                    alert('本日すでに【有給】で申請されています！打刻する場合は、履歴画面から有給をキャンセルしてください。');
                    return;
                }

                if (type === 'in' && existingRec?.clockIn) {
                    alert('すでに「出勤」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                    return;
                }
                if (type === 'out' && existingRec?.clockOut) {
                   alert('すでに「退勤」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                   return;
                }
                if (type === 'break_in' && existingRec?.breakStart) {
                   alert('すでに「中抜け開始」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                   return;
                }
                if (type === 'break_out' && existingRec?.breakEnd) {
                   alert('すでに「中抜け終了」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                   return;
                }

                if (type === 'out' && existingRec?.clockIn) {
                    const workSec = calculateDuration(existingRec.clockIn, timeStr);
                    if (workSec >= 6 * 3600) {
                        const hasMiddleBreak = !!(existingRec.breakStart && existingRec.breakEnd);
                        if (hasMiddleBreak) {
                            const input = window.prompt("中抜けの打刻を確認しました。\n中抜けとは別に休憩を取りましたか？\n（取った分数を半角数字で、取っていない場合は「0」を入力）", "45");
                            if (input === null) return;
                            additionalBreakPromptMins = parseInt(input) || 0;
                        } else {
                            const input = window.prompt("⚠️ 6時間以上勤務しています。\n休憩は何分でしたか？（規定通りの場合は「45」、無しは「0」）", "45");
                            if (input === null) return;
                            additionalBreakPromptMins = parseInt(input) || 0;
                        }
                    }
                }

                let updatedRecord = null;
                setTimeRecords(prev => {
                    const existing = prev.find(r => r.id === recordId) || {
                        id: recordId, staffName: selectedStaffName, date: dateStr,
                        clockIn: null, breakStart: null, breakEnd: null, clockOut: null,
                        meal: false, isPaidLeave: false, remarks: '', additionalBreakMins: 0
                    };

                    const updated = { ...existing };
                    if (type === 'in' && !updated.clockIn) updated.clockIn = timeStr;
                    if (type === 'out' && !updated.clockOut) updated.clockOut = timeStr;
                    if (type === 'break_in' && !updated.breakStart) updated.breakStart = timeStr;
                    if (type === 'break_out' && !updated.breakEnd) updated.breakEnd = timeStr;
                    
                    // どの打刻時でも現在の賄いチェック状態を保存する
                    updated.meal = hasMeal;

                    if (type === 'out' || type === 'update_info') {
