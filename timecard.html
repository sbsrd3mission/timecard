        const useAppData = () => {

                            // GASから取得したスタッフリストにもデフォルト値を付与（旧形式データ対応）
                            const withDefaults = (s) => {
                                const base = typeof s === 'string' ? { name: s, defaultMeal: true } : s;
                                return { isOutsourced: false, hourlyRate: 1200, dailyTransport: 0, ...base };
                            };
                            setStaffList(data.settings.staffList.map(withDefaults));
                        }
                        if (data.settings.adminPin) setAdminPin(data.settings.adminPin);
                        console.log('Settings synced from GAS');
                    } else if (data.status === 'ok' && !data.settings) {
                        // GASに設定がない場合、このデバイスのローカル設定をGASに保存する
                        const localList = JSON.parse(localStorage.getItem('timecard_staff_v2') || '[]');
                        const localPin = localStorage.getItem('admin_pin') || '0000';
                        if (localList.length > 0) {
                            fetch(targetUrl, {
                                method: 'POST', mode: 'no-cors',
                                headers: { 'Content-Type': 'text/plain' },
                                body: JSON.stringify({ action: 'saveSettings', settings: { staffList: localList, adminPin: localPin } })
                            }).then(() => console.log('Local settings pushed to GAS'));
                        }
                    }
                } catch(e) { console.error('Sync settings failed', e); }
            };

            // === clientUpdatedAt ベースの同期保護 ===
            // 全てのレコード変更時に clientUpdatedAt (ISO 8601) を付与。
            // 同期時はこのタイムスタンプで新旧を判定し、最新データを勝たせる。

            // GASへの送信関数
            const sendToGAS = async (record) => {
                if (!gasUrl) return;
                // clientUpdatedAt が無い場合は付与（安全弁）
                if (!record.clientUpdatedAt) record.clientUpdatedAt = new Date().toISOString();
                localStorage.setItem('timecard_local_update_time', Date.now().toString());
                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'record', ...record })
                    });
                    // no-corsモードではレスポンスを読めない
                    const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                    const updated = pending.filter(p => p.id !== record.id);
                    localStorage.setItem('timecard_pending_sync', JSON.stringify(updated));
                } catch(e) {
                    // 送信失敗 → 未送信リストに追加
                    const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                    const existingIdx = pending.findIndex(p => p.id === record.id);
                    if (existingIdx >= 0) {
                        pending[existingIdx] = record; // 最新データで上書き
                    } else {
                        pending.push(record);
                    }
                    localStorage.setItem('timecard_pending_sync', JSON.stringify(pending));
                }
            };

            const deleteFromGAS = async (recordId) => {
                if (!gasUrl) return;
                const [staff, dStr] = recordId.split('_');
                const deleteRecord = {
                    id: recordId,
                    staffName: staff,
                    date: dStr,
                    deleted: true,
                    remarks: "【完全削除済】", // 古いGASがdeletedフラグを無視した場合のフォールバック
                    clientUpdatedAt: new Date().toISOString()
                };
                await sendToGAS(deleteRecord);
            };

            // 未送信データの再送信
            const retrySendPending = async (url) => {
                const targetUrl = url || gasUrl;
                if (!targetUrl) return;
                const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                if (pending.length === 0) return;
                try {
                    await fetch(targetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'sync', records: pending })
                    });
                    localStorage.setItem('timecard_pending_sync', '[]');
                } catch(e) { /* 次回再試行 */ }
            };

            // ===== GASから全データを取得（clientUpdatedAt ベースの双方向同期）=====
            const syncFromGAS = async (url, silent) => {
                const targetUrl = url || gasUrl;
                if (!targetUrl) return { success: false, message: 'GAS URLが未設定です' };

                // ローカル更新直後15秒間は同期をスキップ（初期Race Condition対策）
                const lastUpdate = parseInt(localStorage.getItem('timecard_local_update_time') || '0');
                if (Date.now() - lastUpdate < 15000) {
                    return { success: true, count: 0, merged: [], message: 'ローカル更新直後のためスキップ' };
                }

                if (!silent) setSyncStatus(s => ({ ...s, state: 'loading', message: '同期中...' }));
                try {
                    const cb = '&t=' + Date.now();
                    const response = await fetch(targetUrl + '?action=getAll' + cb, { method: 'GET', cache: 'no-store' });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const data = await response.json();
                    if (data.status !== 'ok') throw new Error(data.message || '不明なエラー');

                    // 通信中にローカル更新が起きた場合はスキップ
                    const checkLastUpdate = parseInt(localStorage.getItem('timecard_local_update_time') || '0');
                    if (Date.now() - checkLastUpdate < 15000) {
                        return { success: true, count: 0, merged: [], message: '通信中にローカル更新が起きたためスキップ' };
                    }

                    const gasRecords = data.records || [];

                    // 未送信リスト（ローカル優先）
                    const pending = JSON.parse(localStorage.getItem('timecard_pending_sync') || '[]');
                    const pendingMap = {};
                    pending.forEach(p => { pendingMap[p.id] = p; });

                    let finalMerged = [];
                    setTimeRecords(prev => {
                        // ローカルデータをMapに変換
                        const localMap = {};
                        prev.forEach(r => { localMap[r.id] = r; });

                        // クラウドデータをMapに変換
                        const cloudMap = {};
                        gasRecords.forEach(r => { cloudMap[r.id] = r; });

                        // 全IDを集める
                        const allIds = new Set([...Object.keys(localMap), ...Object.keys(cloudMap)]);
                        const merged = [];

                        allIds.forEach(id => {
                            const local = localMap[id];
                            const cloud = cloudMap[id];
                            const isPending = !!pendingMap[id];
                            
                            let winner = null;

                            if (isPending) {
                                // 未送信データはローカルを常に優先
                                winner = pendingMap[id];
                            } else if (local && cloud) {
                                // 両方にある場合: clientUpdatedAt で比較 (クラウドが旧バージョンの場合は serverUpdatedAtMs を使用)
                                const localTs = (local.clientUpdatedAt && !isNaN(new Date(local.clientUpdatedAt).getTime())) ? new Date(local.clientUpdatedAt).getTime() : 0;
                                const cloudTs = (cloud.clientUpdatedAt && !isNaN(new Date(cloud.clientUpdatedAt).getTime())) ? new Date(cloud.clientUpdatedAt).getTime() : (Number(cloud.serverUpdatedAtMs) || 0);
                                winner = (localTs > cloudTs) ? local : cloud;
                            } else if (cloud) {
                                // クラウドのみ → クラウドデータを採用
                                winner = cloud;
                            } else if (local) {
                                // ローカルのみ（クラウド側のシートが削除された場合など）→ ローカルデータを採用
                                winner = local;
                            }

                            // winner が null の場合はスキップ（安全弁）
                            if (!winner) return;

                            // Tombstone（削除済みフラグ）がない場合のみ採用
                            // ※ 古いGASコードが deleted を返さない場合のためのフォールバックとして remarks もチェック
                            const isDeleted = (
                                winner.deleted === true || 
                                winner.deleted === "true" || 
                                (typeof winner.remarks === 'string' && winner.remarks.includes("【完全削除済】"))
                            );

                            if (!isDeleted) {
                                merged.push(winner);
                            }
                        });

                        finalMerged = merged;
                        return merged;
                    });

                    // 同期後にローカルの未送信データも送る
                    await retrySendPending(targetUrl);

                    const now = new Date().toLocaleString('ja-JP');
                    localStorage.setItem('timecard_last_sync', now);
                    setSyncStatus({ state: 'success', message: gasRecords.length + '件を取得しました', lastSync: now });
                    return { success: true, count: gasRecords.length, merged: finalMerged };

                } catch(e) {
                    const msg = e.message || '不明なエラー';
                    setSyncStatus(s => ({ ...s, state: 'error', message: '同期失敗: ' + msg }));
                    return { success: false, message: msg };
                }
            };

            // GAS URL変更時・起動時・定期的に自動同期
            useEffect(() => {
                if (gasUrl) {
                    syncFromGAS(gasUrl, true);
                    syncSettingsFromGAS(gasUrl); // 設定情報の同期

                    const intervalId = setInterval(() => {
                        syncFromGAS(gasUrl, true);
                    }, 3000); // 3秒ごとに自動同期して他端末のラグを最小化

                    // 画面にフォーカスが戻ったときに即座に同期
                    const handleFocus = () => { syncFromGAS(gasUrl, true); syncSettingsFromGAS(gasUrl); };
                    const handleVisibility = () => {
                        if (document.visibilityState === 'visible') { syncFromGAS(gasUrl, true); syncSettingsFromGAS(gasUrl); }
                    };
                    window.addEventListener('focus', handleFocus);
                    document.addEventListener('visibilitychange', handleVisibility);

                    return () => {
                        clearInterval(intervalId);
                        window.removeEventListener('focus', handleFocus);
                        document.removeEventListener('visibilitychange', handleVisibility);
                    };
                }
            }, [gasUrl]);

            return { staffList, setStaffList, timeRecords, setTimeRecords, adminPin, setAdminPin, gasUrl, setGasUrl, sendToGAS, deleteFromGAS, syncFromGAS, saveSettingsToGAS, syncSettingsFromGAS, syncStatus };
        };

        const calculateDuration = (start, end) => {
            if (!start || !end) return 0;
            const parse = t => {
                const [h,m,s] = t.split(':').map(Number);
                return (h || 0) * 3600 + (m || 0) * 60 + (s || 0);
            };
            const diff = parse(end) - parse(start);
            return diff > 0 ? diff : 0;
        };
        
        const formatTimeHM = (t) => t ? t.substring(0, 5) : '';

        // --- 時計コンポーネント ---
        const RealtimeClock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateStr = `${time.getFullYear()}年${time.getMonth() + 1}月${time.getDate()}日 (${days[time.getDay()]})`;
            const timeStr = time.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            return (
                <div className="text-center my-4 bg-white/60 p-4 rounded-xl shadow-sm border border-secondary/20">
                    <p className="text-lg text-primary/80 font-bold">{dateStr}</p>
                    <p className="text-5xl font-bold text-primary tabular-nums tracking-widest mt-1">{timeStr}</p>
                </div>
            );
        };

        // --- モーダル: 編集・自己申請フォーム ---
        const EditRecordModal = ({ recordId, dateStr, dayOfWeek, defaultStaffName, initialRecord, onClose, onSave, isAdmin, isPaidLeaveMode }) => {
            const [clockIn, setClockIn] = useState(initialRecord?.clockIn ? formatTimeHM(initialRecord.clockIn) : '');
            const [clockOut, setClockOut] = useState(initialRecord?.clockOut ? formatTimeHM(initialRecord.clockOut) : '');
            const [breakStart, setBreakStart] = useState(initialRecord?.breakStart ? formatTimeHM(initialRecord.breakStart) : '');
            const [breakEnd, setBreakEnd] = useState(initialRecord?.breakEnd ? formatTimeHM(initialRecord.breakEnd) : '');
            const [additionalBreak, setAdditionalBreak] = useState(initialRecord?.additionalBreakMins || 0);
            const [meal, setMeal] = useState(initialRecord?.meal || false);
            const [remarks, setRemarks] = useState(initialRecord?.remarks || '');
            const [isPaidLeave, setIsPaidLeave] = useState(initialRecord?.isPaidLeave || isPaidLeaveMode);

            const handleSave = () => {
                if (isPaidLeave) {
                    const confirmLeave = window.confirm(`${dateStr} を【有給申請】で登録しますか？\n（出勤時刻などの入力内容はクリアされます）`);
                    if (!confirmLeave) return;
                } else {
                    if (!clockIn && clockOut) { alert("🚨 エラー：出勤時間が入力されていません！"); return; }
                    if (clockIn && clockOut && clockOut < clockIn) { alert("🚨 エラー：退勤時間は出勤時間より後である必要があります！"); return; }
                    if (breakStart && !breakEnd) { alert("🚨 エラー：中抜けの終了時間がありません！"); return; }
                    if (!breakStart && breakEnd) { alert("🚨 エラー：中抜けの開始時間がありません！"); return; }
                }

                const safeTimeStr = (hm) => hm ? hm + ':00' : null;
                const finalRemarks = remarks.trim();
                let systemAppendedRemarks = finalRemarks;
                
                if (!isAdmin && !isPaidLeave) {
                    if (!systemAppendedRemarks.includes('【本人修正済】')) {
                        systemAppendedRemarks += (systemAppendedRemarks ? ' ' : '') + '【本人修正済】';
                    }
                }

                let finalRecord = {
                    id: recordId, staffName: defaultStaffName, date: dateStr,
                    clockIn: isPaidLeave ? null : safeTimeStr(clockIn),
                    clockOut: isPaidLeave ? null : safeTimeStr(clockOut),
                    breakStart: isPaidLeave ? null : safeTimeStr(breakStart),
                    breakEnd: isPaidLeave ? null : safeTimeStr(breakEnd),
                    additionalBreakMins: isPaidLeave ? 0 : parseInt(additionalBreak) || 0,
                    meal: isPaidLeave ? false : meal,
                    isPaidLeave: isPaidLeave,
                    remarks: systemAppendedRemarks,
                    clientUpdatedAt: new Date().toISOString()
                };
                onSave(finalRecord);
            };

            const handleDelete = () => {
                if (window.confirm(`本当に ${dateStr} のすべての打刻データ（有給申請含む）を取り消してクリアしますか？\n（この操作は元に戻せません）`)) {
                    onSave(null);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                    <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className={`p-4 text-white flex justify-between items-center ${isPaidLeave ? 'bg-sky-500' : 'bg-primary'}`}>
                            <h3 className="font-bold text-lg flex items-center gap-2">
                                {isPaidLeave ? '🏖 有給申請' : '✏️ 打刻データの修正'}
                            </h3>
                            <button onClick={onClose} className="hover:bg-black/20 p-1 rounded-full transition-colors"><CloseIcon /></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto flex-1">
                            <div className="text-center font-bold text-xl mb-4 border-b-2 border-primary/10 pb-2">
                                {dateStr} ({dayOfWeek})
                            </div>
                            
                            <label className={`block border-2 rounded-xl p-3 mb-6 cursor-pointer transition-colors ${isPaidLeave ? 'border-sky-500 bg-sky-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                <div className="flex items-center justify-between">
                                    <span className={`font-bold text-lg ${isPaidLeave ? 'text-sky-600' : 'text-gray-500'}`}>🏖 この日を有給申請にする</span>
                                    <input type="checkbox" checked={isPaidLeave} onChange={(e) => setIsPaidLeave(e.target.checked)} className="w-6 h-6 border-2 accent-sky-500" />
                                </div>
                                {isPaidLeave && <p className="text-xs text-sky-600 mt-2">※出力時に「有給申請」として自動記録されます。</p>}
                            </label>

                            {!isPaidLeave && (
                                <div className="space-y-4 animate-fade-in">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-primary mb-1">出勤</label>
                                            <input type="time" value={clockIn} onChange={(e) => setClockIn(e.target.value)} className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-primary mb-1">退勤</label>
                                            <input type="time" value={clockOut} onChange={(e) => setClockOut(e.target.value)} className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 bg-surface p-3 rounded-xl border border-primary/10">
                                        <div>
                                            <label className="block text-xs font-bold text-primary/70 mb-1">中抜け開始</label>
                                            <input type="time" value={breakStart} onChange={(e) => setBreakStart(e.target.value)} className="w-full border border-primary/20 rounded-lg p-2 font-bold focus:border-secondary focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-primary/70 mb-1">中抜け終了</label>
                                            <input type="time" value={breakEnd} onChange={(e) => setBreakEnd(e.target.value)} className="w-full border border-primary/20 rounded-lg p-2 font-bold focus:border-secondary focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 items-end">
                                        <div className="flex-1">
                                            <label className="block text-xs font-bold text-primary mb-1">追加の休憩（分）</label>
                                            <input type="number" value={additionalBreak} onChange={(e) => setAdditionalBreak(e.target.value)} min="0" className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                        <label className="flex-1 flex items-center justify-center space-x-2 cursor-pointer border-2 border-primary/20 rounded-xl p-2 hover:bg-surface transition-colors">
                                            <input type="checkbox" checked={meal} onChange={(e) => setMeal(e.target.checked)} className="w-5 h-5 accent-secondary" />
                                            <span className="font-bold text-primary">🥗 賄い</span>
                                        </label>
                                    </div>
                                </div>
                            )}

                            <div className="mt-4">
                                <label className="block text-xs font-bold text-primary mb-1">備考</label>
                                <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} rows="3" placeholder="コメントや申請理由など..." className="w-full border-2 border-primary/20 rounded-xl p-2 text-sm focus:border-secondary focus:outline-none resize-none"></textarea>
                                {!isAdmin && !isPaidLeave && (
                                    <div className="mt-2 p-2 bg-amber-50 rounded text-xs text-amber-700 font-bold border border-amber-200">
                                        ⚠️ 保存した場合、日付の備考欄に「本人修正済」と記録が残ります。
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="p-4 border-t-2 border-primary/10 bg-gray-50 flex justify-between gap-3">
                            <button onClick={handleDelete} className="px-4 py-3 text-sm font-bold text-danger hover:bg-danger/10 rounded-xl transition-colors">
                                完全取消
                            </button>
                            <div className="flex gap-2 w-full justify-end">
                                <button onClick={onClose} className="px-5 py-3 text-sm font-bold text-primary bg-white border-2 border-primary/20 rounded-xl hover:bg-gray-100 transition-colors">
                                    キャンセル
                                </button>
                                <button onClick={handleSave} className="px-6 py-3 text-sm font-bold text-white bg-primary rounded-xl hover:bg-primary/90 transition-colors shadow-md">
                                    保存する
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- カレンダー・履歴マネージャー ---
        const MonthlyTimeEditor = ({ staffName, isAdmin, timeRecords, setTimeRecords, sendToGAS, deleteFromGAS, onBack }) => {
            const [selectedMonth, setSelectedMonth] = useState(() => {
                const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [editModalData, setEditModalData] = useState(null);

            const [yearStr, monthStr] = selectedMonth.split('-');
            const year = parseInt(yearStr);
            const month = parseInt(monthStr);
            const daysInMonth = new Date(year, month, 0).getDate();

            const handleSaveRecord = (newRecord) => {
                const recordId = editModalData.recordId;
                if (newRecord === null) {
                    setTimeRecords(prev => prev.filter(r => r.id !== recordId));
                    if (deleteFromGAS) deleteFromGAS(recordId);
                } else {
                    setTimeRecords(prev => [...prev.filter(r => r.id !== recordId), newRecord]);
                    if (sendToGAS) sendToGAS(newRecord);
                }
                setEditModalData(null);
            };

            const renderTableRows = () => {
                const rows = [];
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month - 1, d);
                    const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][dateObj.getDay()];
                    const rowBgClass = dateObj.getDay() === 0 ? 'bg-red-50' : dateObj.getDay() === 6 ? 'bg-blue-50' : 'bg-white hover:bg-surface transition-colors cursor-pointer';

                    const dateStrLong = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const recordId = `${staffName}_${dateStrLong}`;
                    const record = timeRecords.find(r => r.id === recordId);

                    rows.push(
                        <tr key={d} className={`border-b border-primary/10 ${rowBgClass}`} onClick={() => setEditModalData({ recordId, dateStr: dateStrLong, dayOfWeek, record, isPaidLeaveMode: false })}>
                            <td className="p-3 text-center border-r border-primary/10 font-bold whitespace-nowrap">
                                {d} <span className="text-xs text-gray-500">({dayOfWeek})</span>
                            </td>
                            {record ? (
                                record.isPaidLeave ? (
                                    <>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-2 text-center text-sm font-bold text-sky-600 truncate max-w-[100px]" title={record.remarks}>
                                            【有給申請】 {record.remarks}
                                        </td>
                                        <td className="p-2 text-center">
                                            <button className="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">修正</button>
                                        </td>
                                    </>
                                ) : (
                                    <>
                                        <td className="p-3 text-center font-bold text-primary">{formatTimeHM(record.clockIn) || '-'}</td>
                                        <td className="p-3 text-center font-bold text-[#b45309]">{formatTimeHM(record.clockOut) || '-'}</td>
                                        <td className="p-3 text-center text-xs text-primary/70">
                                            {formatTimeHM(record.breakStart)}〜{formatTimeHM(record.breakEnd)}
                                            {record.additionalBreakMins > 0 && <span className="block text-[10px] text-accent">追:{record.additionalBreakMins}分</span>}
                                        </td>
                                        <td className="p-3 text-center">{record.meal ? '🥗' : '-'}</td>
                                        <td className="p-2 text-xs truncate max-w-[100px] text-gray-500 relative">
                                            {record.remarks?.includes('【本人修正済】') ? (
                                                <span className="bg-amber-100 text-amber-700 px-1 py-0.5 rounded text-[10px] font-bold inline-block mr-1" title={record.remarks}>修正済</span>
                                            ) : ''}
                                            {record.remarks?.replace('【本人修正済】', '').trim() || '-'}
                                        </td>
                                        <td className="p-2 text-center">
                                            <button className="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">修正</button>
                                        </td>
                                    </>
                                )

                    <div className="bg-white p-5 rounded-3xl border-2 border-primary/20 shadow-sm">

                            </div>
                            <div>
                                <input 
                                    type="month" 
                                    value={selectedMonth}

                                />
                            </div>
                        </div>

                        {!isAdmin && (
                            <div className="mb-4 bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs text-amber-800 font-bold">
                                💡 出勤・退勤の押し忘れ等は、カレンダーの行をタップ（クリック）して自分で修正できます。<br/>
                                🏖 「有給」を申請する場合は、空いている日をタップして「🏖 有給」を押してください。
                            </div>
                        )}

                        <div className="overflow-x-auto rounded-xl border-2 border-primary/10 shadow-inner max-h-[60vh] overflow-y-auto w-full">
                            <table className="w-full text-left border-collapse" style={{ minWidth: '700px' }}>
                                <thead className="bg-primary/5 sticky top-0 z-10 shadow-sm">
                                    <tr>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-24">日付</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-20">出勤</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-20">退勤</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-24">中抜け・休憩</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-16">賄い</th>

                                    </tr>
                                </thead>
                                <tbody>
