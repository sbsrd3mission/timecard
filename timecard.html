                        </div>
                    </div>

                    {editModalData && (
                        <EditRecordModal 
                            recordId={editModalData.recordId}
                            dateStr={editModalData.dateStr}
                            dayOfWeek={editModalData.dayOfWeek}
                            defaultStaffName={staffName}
                            initialRecord={editModalData.record}
                            isAdmin={isAdmin}
                            isPaidLeaveMode={editModalData.isPaidLeaveMode}
                            onClose={() => setEditModalData(null)}
                            onSave={handleSaveRecord}
                        />
                    )}
                </div>
            );
        };

        // --- 管理者ダッシュボードコンポーネント ---
        const AdminDashboard = ({ 
            staffList, setStaffList, 
            timeRecords, setTimeRecords, 
            adminPin, setAdminPin,
            gasUrl, setGasUrl,
            syncFromGAS, saveSettingsToGAS, syncStatus,
            openAdminHistoryView 
        }) => {
            const [targetMonth, setTargetMonth] = useState(() => {
                const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [newStaffName, setNewStaffName] = useState('');
            // fileInputRef は不要になりました（テンプレート埋め込み済み）

            const handleAddStaff = () => {
                if (newStaffName && !staffList.find(s => s.name === newStaffName)) {
                    const newList = [...staffList, { name: newStaffName, defaultMeal: true, isOutsourced: false, hourlyRate: 1200, dailyTransport: 0 }];
                    setStaffList(newList);
                    saveSettingsToGAS(newList, adminPin);
                    setNewStaffName('');
                } else if(staffList.find(s => s.name === newStaffName)) {
                    alert('すでに同じ名前のスタッフがいます。');
                }
            };

            const toggleMealSetting = (name) => {
                const newList = staffList.map(s => s.name === name ? { ...s, defaultMeal: !s.defaultMeal } : s);
                setStaffList(newList);
                saveSettingsToGAS(newList, adminPin);
            };
            const toggleOutsourced = (name) => {
                const newList = staffList.map(s => s.name === name ? { ...s, isOutsourced: !s.isOutsourced } : s);
                setStaffList(newList);
                saveSettingsToGAS(newList, adminPin);
            };
            // debounce用タイマーRef（時給・交通費の入力で1文字ごとにGAS送信されるのを防止）
            const settingsSaveTimerRef = useRef(null);
            const debouncedSaveSettingsToGAS = (newList, pin) => {
                if (settingsSaveTimerRef.current) clearTimeout(settingsSaveTimerRef.current);
                settingsSaveTimerRef.current = setTimeout(() => {
                    saveSettingsToGAS(newList, pin);
                }, 500);
            };
            const updateHourlyRate = (name, val) => {
                const newList = staffList.map(s => s.name === name ? { ...s, hourlyRate: parseInt(val) || 0 } : s);
                setStaffList(newList);
                debouncedSaveSettingsToGAS(newList, adminPin);
            };
            const updateDailyTransport = (name, val) => {
                const newList = staffList.map(s => s.name === name ? { ...s, dailyTransport: parseInt(val) || 0 } : s);
                setStaffList(newList);
                debouncedSaveSettingsToGAS(newList, adminPin);
            };
            const handleRemoveStaff = (name) => {
                if (window.confirm(`${name}さんを削除しますか？\n（過去の打刻データは消えませんが、プルダウンに表示されなくなります）`)) {
                    const newList = staffList.filter(s => s.name !== name);
                    setStaffList(newList);
                    saveSettingsToGAS(newList, adminPin);
                }
            };
            
            const handleUpdatePin = () => {
                const newPin = window.prompt("新しい管理者用パスワード（4桁の数字）を入力してください：\n（忘れないようにご注意ください）");
                if (newPin) {
                    if (newPin.length !== 4 || isNaN(newPin)) {
                        alert("パスワードは4桁の半角数字で入力してください。");
                    } else {
                        setAdminPin(newPin);
                        saveSettingsToGAS(staffList, newPin);
                        alert(`パスワードを ${newPin} に変更しました。`);
                    }
                }
            };

            const handleExportWithTemplate = async () => {
                try {
                    const [yearStr, monthStr] = targetMonth.split('-');
                    const year = parseInt(yearStr);
                    const month = parseInt(monthStr);

                    const workbook = new ExcelJS.Workbook();

                    // Base64テンプレートをデコードしてバッファに変換
                    const b64 = EXCEL_TEMPLATE_B64;
                    const binaryStr = atob(b64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    const buffer = bytes.buffer;
                    await workbook.xlsx.load(buffer);

                    const daysInMonth = new Date(year, month, 0).getDate();
                    const timeToExcelFraction = (timeStr) => {
                        if (!timeStr) return null;
                        const parts = timeStr.split(':');
                        const h = parseInt(parts[0], 10) || 0;
                        const m = parseInt(parts[1], 10) || 0;
                        const s = parseInt(parts[2], 10) || 0;
                        return (h * 3600 + m * 60 + s) / 86400;
                    };

                    // ステップ1: 全シートの日付・曜日・データセルを対象月に書き換え
                    workbook.eachSheet((ws) => {
                        // ヘッダー行を探す（「出勤」「退勤」「曜日」を含む行）
                        let startRow = -1;
                        ws.eachRow((row, rowNumber) => {
                            if (startRow !== -1) return;
                            let isHeader = false;
                            row.eachCell((cell) => {
                                const v = cell.value;
                                if (typeof v === 'string' && (v.includes('出勤') || v.includes('曜日') || v.includes('退勤'))) {
                                    isHeader = true;
                                }
                            });
                            if (isHeader) startRow = rowNumber + 1;
                        });
                        // ヘッダーが見つからない場合はデータ行を自動検出
                        if (startRow === -1) {
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date || (typeof cellA === 'number' && cellA > 40000)) {
                                    startRow = rowNumber;
                                }
                            });
                        }
                        if (startRow === -1) return; // データ行が見つからないシートはスキップ

                        for (let d = 1; d <= 31; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            // 全書き込み対象セルをクリア
                            [1,2,3,4,5,6,7,16].forEach(c => { row.getCell(c).value = null; });

                            if (d <= daysInMonth) {
                                const targetDateObj = new Date(year, month - 1, d);
                                const dateVal = new Date(Date.UTC(year, month - 1, d, 12, 0, 0));
                                row.getCell(1).value = dateVal;
                                row.getCell(1).numFmt = 'yyyy/m/d';
                                row.getCell(2).value = ['日', '月', '火', '水', '木', '金', '土'][targetDateObj.getDay()];
                            }
                        }
                    });

                    // ステップ2: staffListに登録されたスタッフのシートに勤怠データを書き込み
                    staffList.filter(s => !s.isOutsourced).forEach(staff => {
                        let ws = workbook.getWorksheet(staff.name);

                        // ===== 完全一致のシートがない場合のハイブリッド対応 =====
                        if (!ws) {
                            // 1. リネーム追従：名前の部分一致シートを探す
                            let fallbackWs = null;
                            workbook.eachSheet((sheet) => {
                                if (sheet.name !== 'マスタ' && sheet.name.length > 0 && staff.name.includes(sheet.name)) {
                                    if (!fallbackWs) fallbackWs = sheet;
                                }
                            });
                            if (fallbackWs) {
                                fallbackWs.name = staff.name; // 旧シートをフルネームにリネーム
                                ws = fallbackWs;
                            }
                        }

                        if (!ws) {
                            // 2. 新規作成：「マスタ」シートから丸ごとコピーして新規生成
                            const masterWs = workbook.getWorksheet('マスタ');
                            if (masterWs) {
                                ws = workbook.addWorksheet(staff.name);
                                // マスタの列幅・スタイルをコピー
                                masterWs.columns.forEach((col, index) => {
                                    const newCol = ws.getColumn(index + 1);
                                    if (col.width) newCol.width = col.width;
                                    if (col.style) newCol.style = col.style;
                                });
                                // 行の高さ・セル値・スタイルをコピー
                                masterWs.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                                    const newRow = ws.getRow(rowNumber);
                                    if (row.height) newRow.height = row.height;
                                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                                        const newCell = newRow.getCell(colNumber);
                                        newCell.value = cell.value;
                                        newCell.style = cell.style;
                                    });
                                });
                                // 結合セルをコピー
                                if (masterWs.model.merges) {
                                    masterWs.model.merges.forEach(merge => ws.mergeCells(merge));
                                }
                                
                                // 新規シートの日付セル等を今月に更新
                                let sRow = -1;
                                ws.eachRow((r, rNum) => {
                                    if (sRow !== -1) return;
                                    let isH = false;
                                    r.eachCell(c => {
                                        if (typeof c.value === 'string' && (c.value.includes('出勤') || c.value.includes('曜日'))) isH = true;
                                    });
                                    if (isH) sRow = rNum + 1;
                                });
                                if (sRow === -1) sRow = 2;

                                for (let d = 1; d <= 31; d++) {
                                    const r = ws.getRow(sRow + d - 1);
                                    [1,2,3,4,5,6,7,16].forEach(c => { r.getCell(c).value = null; });
                                    if (d <= daysInMonth) {
                                        const tDateObj = new Date(year, month - 1, d);
                                        const dVal = new Date(Date.UTC(year, month - 1, d, 12, 0, 0));
                                        r.getCell(1).value = dVal;
                                        r.getCell(1).numFmt = 'yyyy/m/d';
                                        r.getCell(2).value = ['日', '月', '火', '水', '木', '金', '土'][tDateObj.getDay()];
                                    }
                                }
                            }
                        }

                        if (!ws) {
                            console.warn(`テンプレート内に「マスタ」がないため、${staff.name} さんのシートを生成できません。`);
                            return;
                        }

                        let startRow = -1;
                        ws.eachRow((row, rowNumber) => {
                            if (startRow !== -1) return;
                            let isHeader = false;
                            row.eachCell((cell) => {
                                const v = cell.value;
                                if (typeof v === 'string' && (v.includes('出勤') || v.includes('曜日') || v.includes('退勤'))) {
                                    isHeader = true;
                                }
                            });
                            if (isHeader) startRow = rowNumber + 1;
                        });
                        if (startRow === -1) {
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date) startRow = rowNumber;
                            });
                        }
                        if (startRow === -1) startRow = 2;

                        for (let d = 1; d <= daysInMonth; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            const targetDateStrShort = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const record = timeRecords.find(r => r.id === `${staff.name}_${targetDateStrShort}`);

                            if (record) {
                                if (record.isPaidLeave) {
                                    row.getCell(16).value = '【有給申請】 ' + (record.remarks || '');
                                } else {
                                    row.getCell(3).value = timeToExcelFraction(record.clockIn);
                                    row.getCell(6).value = timeToExcelFraction(record.clockOut);
                                    row.getCell(7).value = record.meal ? 1 : null;

                                    let remarks = record.remarks || '';
                                    if (record.additionalBreakMins > 0) {
                                        if (!record.breakStart && !record.breakEnd) {
                                            row.getCell(4).value = timeToExcelFraction('12:00:00');
                                            const endH = 12 + Math.floor(record.additionalBreakMins / 60);
                                            const endM = record.additionalBreakMins % 60;
                                            row.getCell(5).value = timeToExcelFraction(`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}:00`);
                                        } else {
                                            row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                            row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                            remarks += (remarks ? ' / ' : '') + `追加個別休憩：${record.additionalBreakMins}分`;
                                        }
                                    } else {
                                        row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                        row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                    }
                                    row.getCell(16).value = remarks || null;
                                }
                            }
                        }
                    });

                    // ステップ3: 対象月に出勤記録がないスタッフのシートを削除
                    // マスタシートは常に残す
                    const sheetsToRemove = [];
                    workbook.eachSheet((ws) => {
                        const sheetName = ws.name;
                        if (sheetName === 'マスタ') return; // マスタは残す

                        // このシートのスタッフに対象月のレコードがあるか確認
                        let hasRecord = false;
                        for (let d = 1; d <= daysInMonth; d++) {
                            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const record = timeRecords.find(r => r.id === `${sheetName}_${dateStr}`);
                            if (record) {
                                hasRecord = true;
                                break;
                            }
                        }
                        if (!hasRecord) sheetsToRemove.push(sheetName);
                    });

                    // シートを削除（逆順で削除して安全に処理）
                    sheetsToRemove.forEach(name => {
                        const ws = workbook.getWorksheet(name);
                        if (ws) workbook.removeWorksheet(ws.id);
                    });

                    const outBuffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([outBuffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                    
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `タイムカード入力_${year}${String(month).padStart(2, '0')}給与分_アプリ出力.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    alert('出力に成功しました！');
                } catch (error) {
                    console.error(error);
                    alert("出力中にエラーが発生しました。");
                }
            };

            // ===== 外注者専用エクセル出力（給与計算付き）=====
            const handleExportOutsourced = async () => {
                try {
                    const outsourcedStaff = staffList.filter(s => s.isOutsourced);
                    if (outsourcedStaff.length === 0) {
                        alert('外注者が設定されていません。スタッフ設定で「外注者」をONにしてください。');
                        return;
                    }

                    const [yearStr, monthStr] = targetMonth.split('-');
                    const year = parseInt(yearStr);
                    const month = parseInt(monthStr);
                    const daysInMonth = new Date(year, month, 0).getDate();

                    // ===== 通常テンプレートと同じ処理でロード =====
                    const timeToExcelFraction = (timeStr) => {
                        if (!timeStr) return null;
                        const parts = timeStr.split(':');
                        const h = parseInt(parts[0], 10) || 0;
                        const m = parseInt(parts[1], 10) || 0;
                        const s = parseInt(parts[2], 10) || 0;
                        return (h * 3600 + m * 60 + s) / 86400;
                    };

                    const workbook = new ExcelJS.Workbook();
                    const b64 = EXCEL_TEMPLATE_B64;
                    const binaryStr = atob(b64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                    await workbook.xlsx.load(bytes.buffer);

                    // ステップ1: 全シートの日付・曜日を対象月に更新（通常出力と同じ）
                    const findStartRow = (ws) => {
                        let startRow = -1;
                        ws.eachRow((row, rowNumber) => {
                            if (startRow !== -1) return;
                            let isHeader = false;
                            row.eachCell((cell) => {
                                const v = cell.value;
                                if (typeof v === 'string' && (v.includes('出勤') || v.includes('曜日') || v.includes('退勤'))) isHeader = true;
                            });
                            if (isHeader) startRow = rowNumber + 1;
                        });
                        if (startRow === -1) {
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date || (typeof cellA === 'number' && cellA > 40000)) startRow = rowNumber;
                            });
                        }
                        return startRow;
                    };

                    workbook.eachSheet((ws) => {
                        const startRow = findStartRow(ws);
                        if (startRow === -1) return;
                        for (let d = 1; d <= 31; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            [1,2,3,4,5,6,7,16].forEach(c => { row.getCell(c).value = null; });
                            if (d <= daysInMonth) {
                                const targetDateObj = new Date(year, month - 1, d);
                                const dateVal = new Date(Date.UTC(year, month - 1, d, 12, 0, 0));
                                row.getCell(1).value = dateVal;
                                row.getCell(1).numFmt = 'yyyy/m/d';
                                row.getCell(2).value = ['日','月','火','水','木','金','土'][targetDateObj.getDay()];
                            }
                        }
                    });

                    // ステップ2: 外注者のデータを書き込み（賄いは書かない）
                    const outsourcedPayData = {};
                    outsourcedStaff.forEach(staff => {
                        let ws = workbook.getWorksheet(staff.name);

                        // ===== 完全一致のシートがない場合のハイブリッド対応 =====
                        if (!ws) {
                            let fallbackWs = null;
                            workbook.eachSheet((sheet) => {
                                if (sheet.name !== 'マスタ' && sheet.name.length > 0 && staff.name.includes(sheet.name)) {
                                    if (!fallbackWs) fallbackWs = sheet;
                                }
                            });
                            if (fallbackWs) {
                                fallbackWs.name = staff.name; // 旧シートをフルネームにリネーム
                                ws = fallbackWs;
                            }
                        }

                        if (!ws) {
                            const masterWs = workbook.getWorksheet('マスタ');
                            if (masterWs) {
                                ws = workbook.addWorksheet(staff.name);
                                masterWs.columns.forEach((col, index) => {
                                    const newCol = ws.getColumn(index + 1);
                                    if (col.width) newCol.width = col.width;
                                    if (col.style) newCol.style = col.style;
                                });
                                masterWs.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                                    const newRow = ws.getRow(rowNumber);
                                    if (row.height) newRow.height = row.height;
                                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                                        const newCell = newRow.getCell(colNumber);
                                        newCell.value = cell.value;
                                        newCell.style = cell.style;
                                    });
                                });
                                if (masterWs.model.merges) {
                                    masterWs.model.merges.forEach(merge => ws.mergeCells(merge));
                                }

                                let sRow = findStartRow(ws);
                                if (sRow === -1) sRow = 2;

                                for (let d = 1; d <= 31; d++) {
                                    const r = ws.getRow(sRow + d - 1);
                                    [1,2,3,4,5,6,7,16].forEach(c => { r.getCell(c).value = null; });
                                    if (d <= daysInMonth) {
                                        const tDateObj = new Date(year, month - 1, d);
                                        const dVal = new Date(Date.UTC(year, month - 1, d, 12, 0, 0));
                                        r.getCell(1).value = dVal;
                                        r.getCell(1).numFmt = 'yyyy/m/d';
                                        r.getCell(2).value = ['日','月','火','水','木','金','土'][tDateObj.getDay()];
                                    }
                                }
                            }
                        }

                        if (!ws) {
                            console.warn(`テンプレート内に「マスタ」がないため、${staff.name} さんのシートを生成できません。`);
                            return;
                        }

                        const startRow = findStartRow(ws);
                        if (startRow === -1) return;

                        let totalDays = 0, totalCalcFrac = 0;

                        for (let d = 1; d <= daysInMonth; d++) {
                            const row = ws.getRow(startRow + d - 1);
                            const dateStrShort = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                            const record = timeRecords.find(r => r.id === `${staff.name}_${dateStrShort}`);
                            if (!record) continue;

                            if (record.isPaidLeave) {
                                row.getCell(16).value = '【有給申請】 ' + (record.remarks || '');
                            } else {
                                row.getCell(3).value = timeToExcelFraction(record.clockIn);
                                row.getCell(6).value = timeToExcelFraction(record.clockOut);
                                // 賄い（col 7）は外注者なので書かない

                                let remarks = record.remarks || '';
                                if (record.additionalBreakMins > 0) {
                                    if (!record.breakStart && !record.breakEnd) {
                                        row.getCell(4).value = timeToExcelFraction('12:00:00');
                                        const endH = 12 + Math.floor(record.additionalBreakMins / 60);
                                        const endM = record.additionalBreakMins % 60;
                                        row.getCell(5).value = timeToExcelFraction(`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}:00`);
                                    } else {
                                        row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                        row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                        remarks += (remarks ? ' / ' : '') + `追加個別休憩：${record.additionalBreakMins}分`;
                                    }
                                } else {
                                    row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                    row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                }
                                row.getCell(16).value = remarks || null;

                                if (record.clockIn && record.clockOut) {
                                    const ci = timeToExcelFraction(record.clockIn);
                                    const co = timeToExcelFraction(record.clockOut);
                                    const bs = timeToExcelFraction(record.breakStart);
                                    const be = timeToExcelFraction(record.breakEnd);
                                    let workFrac = co - ci;
                                    if (workFrac < 0) workFrac += 1;
                                    if (bs && be) workFrac -= (be - bs);
                                    const breakDeduct = workFrac > (6 / 24) ? (30 / 1440) : 0;
                                    totalCalcFrac += Math.max(0, workFrac - breakDeduct);
                                    totalDays++;
                                }
                            }
                        }

                        // 給与計算ブロックをデータ行の下に追加
                        const hourlyRate = staff.hourlyRate || 1200;
                        const dailyTransport = staff.dailyTransport || 0;
                        const totalH = Math.round(totalCalcFrac * 24 * 100) / 100;
                        const remuneration = Math.round(totalH * hourlyRate);
                        const transportTotal = dailyTransport * totalDays;
                        const totalBill = remuneration + transportTotal;
                        const moneyFmt = '#,##0"円"';
                        const blockStart = startRow + 33; // データ31行＋バッファ

                        const labelFont = { bold: true };
                        const bgPay = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF3E0' } };
                        const bgBill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFCE4EC' } };

                        const setPayRow = (offset, label, value, fmt, note, isBig) => {
                            const r = ws.getRow(blockStart + offset);
                            r.getCell(3).value = label; r.getCell(3).font = labelFont; r.getCell(3).fill = bgPay;
                            r.getCell(4).value = value;
                            if (fmt) r.getCell(4).numFmt = fmt;
                            if (isBig) r.getCell(4).font = { bold: true, size: 12 };
                            r.getCell(4).fill = isBig ? bgBill : bgPay;
                            if (note) { r.getCell(5).value = note; r.getCell(5).fill = bgPay; }
                        };

                        ws.getRow(blockStart).getCell(3).value = '【給与計算】';
                        ws.getRow(blockStart).getCell(3).font = { bold: true, size: 11 };
                        setPayRow(1, '勤務時間合計', totalH + ' 時間', null, `(${totalDays}日出勤)`, false);
                        setPayRow(2, '時給', hourlyRate, moneyFmt, null, false);
                        setPayRow(3, '1日交通費', dailyTransport, moneyFmt, null, false);
                        setPayRow(4, '報酬', remuneration, moneyFmt, `${totalH}時間 × ${hourlyRate.toLocaleString()}円`, false);
                        setPayRow(5, '交通費合計', transportTotal, moneyFmt, `${dailyTransport.toLocaleString()}円 × ${totalDays}日`, false);
                        setPayRow(6, '請求合計', totalBill, moneyFmt, null, true);

                        outsourcedPayData[staff.name] = true;
                    });

                    // ステップ3: 外注者以外のシートを削除
                    const outsourcedNames = new Set(outsourcedStaff.map(s => s.name));
                    const sheetsToRemove = [];
                    workbook.eachSheet((ws) => {
                        if (ws.name === 'マスタ') return;
                        if (!outsourcedNames.has(ws.name)) {
                            sheetsToRemove.push(ws.name);
                            return;
                        }
                        // 外注者でもデータがなければ削除
                        if (!outsourcedPayData[ws.name]) sheetsToRemove.push(ws.name);
                    });
                    sheetsToRemove.forEach(name => {
                        const ws = workbook.getWorksheet(name);
                        if (ws) workbook.removeWorksheet(ws.id);
                    });

                    if (workbook.worksheets.length === 0) {
                        alert('外注者のシートがテンプレート内に見つかりませんでした。\nスタッフ名がテンプレートのシート名と完全一致しているか確認してください。');
                        return;
                    }

                    const outBuffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([outBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `外注タイムカード_${year}${String(month).padStart(2,'0')}給与分.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    alert('外注者エクセルを出力しました！');
                } catch (error) {
                    console.error(error);
                    alert('外注者エクセルの出力中にエラーが発生しました。\n' + error.message);
                }
            };

            return (
                <div className="animate-fade-in space-y-8 text-left w-full relative z-10">
                    <div className="border-b-2 border-primary/20 pb-4 mb-6 flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-primary flex items-center gap-2">
                            <SettingsIcon /> 管理者メニュー
                        </h2>
                        <button onClick={handleUpdatePin} className="text-xs bg-surface border border-primary/20 text-primary font-bold px-3 py-1.5 rounded-lg hover:bg-white shadow-sm">
                            🔑 パスワード変更
                        </button>
                    </div>
                    
                    <div className="p-6 bg-surface rounded-2xl border-2 border-secondary/30 shadow-sm relative overflow-hidden">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2 relative z-10">
                            🌿 月次エクセル出力
                        </h3>
                        <p className="text-sm text-primary/80 mb-4 font-medium">対象月を選んでボタンを押すだけで出力できます。</p>
                        
                        <div className="flex flex-col gap-4">
                            <div>
                                <label className="block text-sm font-bold text-primary mb-2">出力したい対象月</label>
                                <input type="month" value={targetMonth} onChange={(e) => setTargetMonth(e.target.value)} className="border-2 border-primary/30 text-lg p-2 rounded-xl focus:border-secondary font-bold text-primary bg-white" />
                            </div>
                            <button onClick={handleExportWithTemplate} className="w-full bg-gradient-to-r from-secondary to-[#65a30d] hover:brightness-110 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-all active:scale-95 text-lg border-b-4 border-[#4d7c0f] flex items-center justify-center gap-2">
                                📥 エクセルファイルを出力する
                            </button>
                            {staffList.some(s => s.isOutsourced) && (
                                <button onClick={handleExportOutsourced} className="w-full bg-gradient-to-r from-orange-400 to-orange-500 hover:brightness-110 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-all active:scale-95 text-lg border-b-4 border-orange-600 flex items-center justify-center gap-2">
                                    📋 外注者エクセルを出力する（給与計算付き）
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="p-6 bg-blue-50 rounded-2xl border-2 border-blue-200 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            ☁️ クラウド双方向同期設定（Googleスプレッドシート連携）
                        </h3>
                        <p className="text-sm text-primary/70 mb-3">Google Apps Scriptのデプロイ後に表示されるURLを入力してください。</p>
                        <div className="flex gap-2 mb-3">
                            <input type="url" value={gasUrl} onChange={(e) => setGasUrl(e.target.value)} placeholder="https://script.google.com/macros/s/xxxxx/exec" className="flex-1 border-2 border-blue-300 p-3 rounded-xl focus:border-blue-500 text-sm bg-white" />
                        </div>
                        <div className="flex flex-wrap items-center gap-2 mb-3">
                            <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold ${gasUrl ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                                {gasUrl ? '✅ 連携ON' : '⏸ 未設定'}
                            </span>
                            {gasUrl && <button onClick={async () => { try { const r = await fetch(gasUrl + '?action=ping'); const j = await r.json(); alert(j.status === 'ok' ? '✅ 接続成功！GASと正常に通信できています。' : '⚠️ 応答がありましたが想定外です: ' + JSON.stringify(j)); } catch(e) { alert('接続テスト失敗: ' + e.message + '\n\n※初回はGASのアクセス許可が必要です。'); } }} className="px-4 py-1.5 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg text-xs transition-colors">🔗 接続テスト</button>}
                            {gasUrl && <button onClick={async () => { const result = await syncFromGAS(); if (result.success) alert('✅ 同期完了！' + result.count + '件のデータを取得しました。'); else alert('❌ 同期失敗: ' + result.message + '\n\nGASの再デプロイが必要な場合があります。手順書をご確認ください。'); }} disabled={syncStatus.state === 'loading'} className="px-4 py-1.5 bg-teal-500 hover:bg-teal-600 disabled:opacity-50 text-white font-bold rounded-lg text-xs transition-colors flex items-center gap-1">{syncStatus.state === 'loading' ? '⏳ 同期中...' : '🔄 今すぐ全データ同期'}</button>}
                        </div>
                        {gasUrl && syncStatus.lastSync && (
                            <div className={`text-xs font-bold px-3 py-2 rounded-lg mb-2 ${
                                syncStatus.state === 'error' ? 'bg-red-50 text-red-600' :
                                syncStatus.state === 'loading' ? 'bg-blue-50 text-blue-600' :
                                'bg-green-50 text-green-700'
                            }`}>
                                {syncStatus.state === 'loading' ? '⏳ 同期中...' :
                                 syncStatus.state === 'error' ? '❌ ' + syncStatus.message :
                                 '✅ 最終同期: ' + syncStatus.lastSync}
                            </div>
                        )}
                        <p className="text-xs text-primary/50 mt-1">※ アプリ起動時に自動同期。すべての打刻がGASを介して全デバイスで共有されます。</p>
                        <div className="mt-2 p-2 bg-yellow-50 border border-yellow-200 rounded-lg">
                            <p className="text-xs text-yellow-800 font-bold">⚠️ アプリの動作がおかしい、または他端末の変更が反映されない場合</p>
                            <p className="text-xs text-yellow-700 mt-1">スマホやブラウザに古いバージョンが残っている可能性があります。定期的に以下のボタンで最新版に再読み込みしてください。</p>
                            <button onClick={() => window.location.reload(true)} className="mt-2 px-3 py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded-lg text-xs transition-colors">
                                🔄 最新版に強制再読み込み
                            </button>
                        </div>
                        <p className="text-xs text-orange-600 font-bold mt-2">⚠️ GASを更新した場合は「新しいデプロイ」が必要です。既存URLと異なるURLが発行されたら、こちらを更新してください。</p>
                    </div>

                    <div className="p-6 bg-white rounded-2xl border-2 border-primary/20 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            📝 マスターデータの手動編集
                        </h3>
                        <div className="flex gap-2 mb-2 flex-wrap">
                            {staffList.map(staff => (
                                <button key={staff.name} onClick={() => openAdminHistoryView(staff.name)} className="px-4 py-2 bg-purple-50 hover:bg-purple-100 text-purple-700 font-bold border-2 border-purple-200 rounded-xl transition-colors whitespace-nowrap">
                                    {staff.name} さん
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="p-6 bg-white rounded-2xl border-2 border-primary/20 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            👥 スタッフ打刻リスト＆賄い設定
                        </h3>
                        <div className="flex gap-2 mb-6">
                            <input type="text" value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} placeholder="新しいスタッフ名" className="flex-1 border-2 border-primary/20 p-3 rounded-xl focus:border-secondary text-md" onKeyPress={e => e.key === 'Enter' && handleAddStaff()} />
                            <button onClick={handleAddStaff} disabled={!newStaffName} className="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl disabled:opacity-50 transition-colors">追加</button>
                        </div>

                        <div className="bg-surface rounded-xl border border-primary/20 overflow-hidden">
                            <ul className="divide-y divide-primary/10 max-h-96 overflow-y-auto w-full">
                                {staffList.map(staff => (
                                    <li key={staff.name} className="bg-white transition-colors">
                                        <div className="p-3 flex items-center gap-2">
                                            <span className="font-bold text-primary text-base flex-1 truncate">{staff.name}</span>
                                            <button onClick={() => toggleMealSetting(staff.name)} className={`px-3 py-1 rounded-full text-xs font-bold transition-colors whitespace-nowrap ${staff.defaultMeal ? 'bg-secondary text-white' : 'bg-gray-200 text-gray-500'}`}>{staff.defaultMeal ? '賄いあり' : '賄いなし'}</button>
                                            <button onClick={() => toggleOutsourced(staff.name)} className={`px-3 py-1 rounded-full text-xs font-bold transition-colors whitespace-nowrap border-2 ${staff.isOutsourced ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-gray-400 border-gray-300'}`}>外注者</button>
                                            <button onClick={() => handleRemoveStaff(staff.name)} className="text-white hover:bg-red-700 bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors whitespace-nowrap">削除</button>
                                        </div>
                                        {staff.isOutsourced && (
                                            <div className="px-4 pb-3 flex flex-wrap gap-3 items-center border-t border-orange-100 bg-orange-50">
                                                <span className="text-xs font-bold text-orange-700 mt-2">💼 外注者設定</span>
                                                <div className="flex items-center gap-1 mt-2">
                                                    <label className="text-xs font-bold text-orange-700 whitespace-nowrap">時給</label>
                                                    <input type="number" min="0" value={staff.hourlyRate ?? 1200} onChange={(e) => updateHourlyRate(staff.name, e.target.value)} className="w-20 border-2 border-orange-300 rounded-lg p-1 text-sm text-right focus:border-orange-500 focus:outline-none bg-white" />
                                                    <span className="text-xs text-gray-600">円</span>
                                                </div>
                                                <div className="flex items-center gap-1 mt-2">
                                                    <label className="text-xs font-bold text-orange-700 whitespace-nowrap">交通費(1日)</label>
                                                    <input type="number" min="0" value={staff.dailyTransport ?? 0} onChange={(e) => updateDailyTransport(staff.name, e.target.value)} className="w-20 border-2 border-orange-300 rounded-lg p-1 text-sm text-right focus:border-orange-500 focus:outline-none bg-white" />
                                                    <span className="text-xs text-gray-600">円</span>
                                                </div>
                                            </div>
                                        )}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // --- メインアプリ ---
        const App = () => {
            const { staffList, setStaffList, timeRecords, setTimeRecords, adminPin, setAdminPin, gasUrl, setGasUrl, sendToGAS, deleteFromGAS, syncFromGAS, saveSettingsToGAS, syncSettingsFromGAS, syncStatus } = useAppData();
            const [view, setView] = useState('punch'); 
            
            const [selectedStaffName, setSelectedStaffName] = useState('');
            const [remarks, setRemarks] = useState('');
            const [hasMeal, setHasMeal] = useState(false);

            const [historyStaffName, setHistoryStaffName] = useState('');
            const [historyIsAdminMode, setHistoryIsAdminMode] = useState(false);
            
            const handleAdminClick = () => {
                if (view === 'punch') {
                    const input = window.prompt("🔑 管理者用パスワード（4桁の数字）を入力してください。");
                    if (input === null) return;
                    if (input === adminPin) {
                        changeView('admin');
                    } else {
                        alert("パスワードが違います。");
                    }
                } else {
                    changeView('punch');
                }
            };

            const handlePunch = (type) => {
                if (!selectedStaffName) return;

                const now = new Date();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + ':00';
                const recordId = `${selectedStaffName}_${dateStr}`;
                
                let additionalBreakPromptMins = 0;
                const existingRec = timeRecords.find(r => r.id === recordId);
                
                if (existingRec?.isPaidLeave && type !== 'update_info') {
                    alert('本日すでに【有給】で申請されています！打刻する場合は、履歴画面から有給をキャンセルしてください。');
                    return;
                }

                if (type === 'in' && existingRec?.clockIn) {
                    alert('すでに「出勤」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                    return;
                }
                if (type === 'out' && existingRec?.clockOut) {
                   alert('すでに「退勤」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                   return;
                }
                if (type === 'break_in' && existingRec?.breakStart) {
                   alert('すでに「中抜け開始」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                   return;
                }
                if (type === 'break_out' && existingRec?.breakEnd) {
                   alert('すでに「中抜け終了」で打刻されています！\n（他の端末で打刻された情報が同期されました）');
                   return;
                }

                if (type === 'out' && existingRec?.clockIn) {
                    const workSec = calculateDuration(existingRec.clockIn, timeStr);
                    if (workSec >= 6 * 3600) {
                        const hasMiddleBreak = !!(existingRec.breakStart && existingRec.breakEnd);
                        if (hasMiddleBreak) {
                            const input = window.prompt("中抜けの打刻を確認しました。\n中抜けとは別に休憩を取りましたか？\n（取った分数を半角数字で、取っていない場合は「0」を入力）", "45");
                            if (input === null) return;
                            additionalBreakPromptMins = parseInt(input) || 0;
                        } else {
                            const input = window.prompt("⚠️ 6時間以上勤務しています。\n休憩は何分でしたか？（規定通りの場合は「45」、無しは「0」）", "45");
                            if (input === null) return;
                            additionalBreakPromptMins = parseInt(input) || 0;
                        }
                    }
                }

                let updatedRecord = null;
                setTimeRecords(prev => {
                    const existing = prev.find(r => r.id === recordId) || {
                        id: recordId, staffName: selectedStaffName, date: dateStr,
                        clockIn: null, breakStart: null, breakEnd: null, clockOut: null,
                        meal: false, isPaidLeave: false, remarks: '', additionalBreakMins: 0
                    };

                    const updated = { ...existing };
                    if (type === 'in' && !updated.clockIn) updated.clockIn = timeStr;
                    if (type === 'out' && !updated.clockOut) updated.clockOut = timeStr;
                    if (type === 'break_in' && !updated.breakStart) updated.breakStart = timeStr;
                    if (type === 'break_out' && !updated.breakEnd) updated.breakEnd = timeStr;
                    
                    // どの打刻時でも現在の賄いチェック状態を保存する
                    updated.meal = hasMeal;

                    if (type === 'out' || type === 'update_info') {
                        if (remarks) updated.remarks = updated.remarks ? updated.remarks + ' / ' + remarks : remarks;
                        if (additionalBreakPromptMins > 0) updated.additionalBreakMins = additionalBreakPromptMins;
                    }

                    // clientUpdatedAt を付与（同期時の競合解決に使用）
                    updated.clientUpdatedAt = new Date().toISOString();

                    updatedRecord = updated;
                    return [...prev.filter(r => r.id !== recordId), updated];
                });

                // GASにバックアップ送信
                if (updatedRecord) sendToGAS(updatedRecord);

                const actionNames = { in: '出勤', out: '退勤', break_in: '中抜け開始', break_out: '中抜け終了', update_info: '情報更新' };
                alert(`${selectedStaffName}さん、${timeStr} に「${actionNames[type]}」として記録しました！`);
                setSelectedStaffName(''); setRemarks(''); setHasMeal(false);
            };

            useEffect(() => {
                if (selectedStaffName) {
                    const staffData = staffList.find(s => s.name === selectedStaffName);
                    const defaultMeal = staffData ? staffData.defaultMeal : true;
                    const dateStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
                    const record = timeRecords.find(r => r.id === `${selectedStaffName}_${dateStr}`);
                    if (record && record.meal !== undefined && record.clockIn) setHasMeal(record.meal);
                    else setHasMeal(defaultMeal);
                    setRemarks('');
                }
            }, [selectedStaffName, timeRecords, staffList]);

            const changeView = (newView) => { setView(newView); document.body.scrollTop = 0; };

            let currentStatus = 'スタッフを選択してください';
            let statusStyle = 'text-primary/60 border-primary/20 bg-white';
            const dateStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
            const currentRecord = timeRecords.find(r => r.id === `${selectedStaffName}_${dateStr}`);

            if (selectedStaffName) {
                if (currentRecord?.isPaidLeave) {
                    currentStatus = '🏖 本日は 有給申請済 です';
                    statusStyle = 'text-sky-600 bg-sky-50 border-sky-300 font-bold';
                } else if (!currentRecord || !currentRecord.clockIn) {
                    currentStatus = '💤 本日は 出勤前 です';
                    statusStyle = 'text-primary bg-primary/10 border-primary/20';
                } else if (currentRecord.clockIn && !currentRecord.clockOut) {
                    if (currentRecord.breakStart && !currentRecord.breakEnd) {
                        currentStatus = '☕ 現在 中抜け中 です';
                        statusStyle = 'text-accent bg-accent/10 border-accent/20 font-bold';
                    } else {
                        currentStatus = '🥘 現在 出勤中（勤務中）です';
                        statusStyle = 'text-[#4d7c0f] bg-secondary/20 border-secondary/40 font-bold';
                    }
                } else if (currentRecord.clockOut) {
                    currentStatus = '🏠 本日は 退勤済 です。お疲れ様でした！';
                    statusStyle = 'text-gray-500 bg-gray-100 border-gray-200';
                }
            }

            // 各ボタンの有効無効判定
            let canClockIn = false;
            let canClockOut = false;
            let canBreakIn = false;
            let canBreakOut = false;

            if (selectedStaffName && (!currentRecord || !currentRecord.isPaidLeave)) {
                if (!currentRecord || !currentRecord.clockIn) {
                    // 出勤前
                    canClockIn = true;
                } else if (currentRecord.clockIn && !currentRecord.clockOut) {
                    if (currentRecord.breakStart && !currentRecord.breakEnd) {
                        // 中抜け中
                        canBreakOut = true;
                    } else {
                        // 出勤中 (中抜け開始前、または中抜け終了後)
                        canClockOut = true;
                        if (!currentRecord.breakStart) {
                            canBreakIn = true;
                        }
                    }
                }
            }

            // 同期通信中の場合は一時的に操作を無効化してステータスを表示
            if (selectedStaffName && syncStatus && syncStatus.state === 'loading') {
                currentStatus = '⏳ 最新データを取得中...';
                statusStyle = 'text-blue-600 bg-blue-50 border-blue-200 font-bold animate-pulse shadow-sm';
                canClockIn = false;
                canClockOut = false;
                canBreakIn = false;
                canBreakOut = false;
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-6 px-4">
                    <div className="w-full max-w-lg mb-6 flex flex-col items-center">
                        <div className="flex justify-center items-end gap-6 mb-2">
                            <img src="./コレトちゃん.avif" alt="コレトちゃん" className="h-20 w-auto object-contain drop-shadow-md" onError={(e) => e.target.style.display='none'} />
                            <img src="./レクトくん.png" alt="レクトくん" className="h-16 w-auto object-contain drop-shadow-md" onError={(e) => e.target.style.display='none'} />
                        </div>
                        <div className="w-full flex justify-between items-center bg-white/70 px-4 py-3 rounded-2xl shadow-sm border border-secondary/30">
                            <h1 className="text-xl sm:text-2xl font-bold text-primary flex items-center gap-1 leading-none">
                                <LeafIcon /> スマート出退勤
                            </h1>
                            <button 
                                onClick={handleAdminClick}
                                className={`flex items-center gap-1 text-xs sm:text-sm transition-colors px-3 py-2 rounded-lg shadow-sm font-bold border ${view === 'punch' ? 'bg-surface text-primary border-primary/20 hover:text-white hover:bg-primary' : 'bg-primary text-white border-transparent'}`}
                            >
                                <SettingsIcon />
                                {view === 'punch' ? '管理者メニュー' : '打刻へ戻る'}
                            </button>
                        </div>
                    </div>

                    <main className={`w-full bg-surface shadow-xl overflow-hidden wood-border p-4 sm:p-8 relative ${view==='history'?'max-w-4xl rounded-[1rem]':'max-w-lg rounded-[2rem]'}`}>
                        {view === 'punch' && (
                            <div className="animate-fade-in text-center">
                                <RealtimeClock />
                                
                                <div className="mb-6 relative z-10 text-left">
                                    <div className="relative mb-3">
                                        <select value={selectedStaffName} onChange={(e) => {
                                            const newName = e.target.value;
                                            setSelectedStaffName(newName);
                                            if (newName && gasUrl) syncFromGAS(gasUrl, false);
                                        }} className="w-full appearance-none bg-white border-[3px] border-secondary/50 text-primary py-4 px-4 pr-10 rounded-2xl focus:border-secondary transition-all text-xl font-bold shadow-sm">
                                            <option value="">-- おなまえ --</option>
                                            {staffList.map(staff => <option key={staff.name} value={staff.name}>{staff.name}</option>)}
                                        </select>
                                    </div>
                                    <div className={`w-full py-2 px-4 rounded-xl border-2 text-center text-sm transition-all duration-300 ${statusStyle}`}>{currentStatus}</div>
                                </div>

                                <div className={`transition-all duration-500 overflow-hidden ${selectedStaffName ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <button onClick={() => { setHistoryStaffName(selectedStaffName); setHistoryIsAdminMode(false); changeView('history'); }} className="w-full mb-6 bg-gradient-to-r from-teal-500 to-sky-500 hover:from-teal-400 hover:to-sky-400 text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all active:scale-95 text-lg flex justify-center items-center gap-2 border-b-4 border-teal-700">
                                        <HistoryIcon />今月の打刻履歴を見る・修正する / 有給申請
                                    </button>

                                    <div className="mb-6 text-left">
                                        <div className={`grid grid-cols-2 gap-3 ${currentRecord?.isPaidLeave ? 'opacity-30 pointer-events-none' : ''}`}>
                                            <button onClick={() => handlePunch('in')} disabled={!canClockIn} className={`col-span-1 font-bold py-6 px-4 rounded-2xl shadow-md transition-all text-2xl border-b-4 ${canClockIn ? 'bg-gradient-to-br from-secondary to-[#65a30d] hover:brightness-110 text-white active:scale-95 border-[#4d7c0f]' : 'bg-gray-300 text-gray-500 border-gray-400 cursor-not-allowed opacity-60'}`}>出勤</button>
                                            <button onClick={() => handlePunch('out')} disabled={!canClockOut} className={`col-span-1 font-bold py-6 px-4 rounded-2xl shadow-md transition-all text-2xl border-b-4 ${canClockOut ? 'bg-gradient-to-br from-accent to-[#b45309] hover:brightness-110 text-white active:scale-95 border-[#78350f]' : 'bg-gray-300 text-gray-500 border-gray-400 cursor-not-allowed opacity-60'}`}>退勤</button>
                                            <button onClick={() => handlePunch('break_in')} disabled={!canBreakIn} className={`col-span-1 font-bold py-4 px-4 rounded-xl shadow-sm border-2 transition-all mt-2 ${canBreakIn ? 'bg-white hover:bg-gray-50 text-primary border-primary/20 active:scale-95' : 'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed opacity-60'}`}>中抜け開始</button>
                                            <button onClick={() => handlePunch('break_out')} disabled={!canBreakOut} className={`col-span-1 font-bold py-4 px-4 rounded-xl shadow-sm border-2 transition-all mt-2 ${canBreakOut ? 'bg-white hover:bg-gray-50 text-primary border-primary/20 active:scale-95' : 'bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed opacity-60'}`}>中抜け終了</button>
                                        </div>
                                    </div>

                                    <div className="text-left">
                                        <div className="bg-white/80 rounded-2xl p-4 border-2 border-primary/10 mb-2 shadow-sm">
                                            <label className="flex items-center space-x-3 cursor-pointer mb-5 p-2 bg-surface rounded-xl border border-primary/10 hover:bg-white transition-colors">
                                                <input type="checkbox" checked={hasMeal} onChange={(e) => setHasMeal(e.target.checked)} className="w-7 h-7 accent-secondary cursor-pointer" />
                                                <span className="text-primary font-bold text-lg">🥗 賄いあり</span>
                                            </label>
                                            <label className="block text-sm font-bold text-primary mb-2">📝 備考（フリーコメント）</label>
                                            <input type="text" value={remarks} onChange={(e) => setRemarks(e.target.value)} placeholder="例：交通費〇〇円 など" className="w-full border-2 border-primary/20 p-3 rounded-xl focus:border-secondary transition-colors" />
                                        </div>
                                        <div className="flex justify-end mt-2"><button onClick={() => handlePunch('update_info')} className="text-sm bg-primary/10 hover:bg-primary/20 text-primary border border-primary/30 py-2 px-5 rounded-xl font-bold transition-colors shadow-sm">情報のみ保存</button></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <AdminDashboard 
                                staffList={staffList} setStaffList={setStaffList} 
                                timeRecords={timeRecords} setTimeRecords={setTimeRecords} 
                                adminPin={adminPin} setAdminPin={setAdminPin}
                                gasUrl={gasUrl} setGasUrl={setGasUrl}
                                syncFromGAS={syncFromGAS} 
                                saveSettingsToGAS={saveSettingsToGAS}
                                syncStatus={syncStatus}
                                openAdminHistoryView={(name) => { setHistoryStaffName(name); setHistoryIsAdminMode(true); changeView('history'); }}
                            />
                        )}

                        {view === 'history' && (
                            <MonthlyTimeEditor 
                                staffName={historyStaffName}
                                isAdmin={historyIsAdminMode}
                                timeRecords={timeRecords}
                                setTimeRecords={setTimeRecords}
                                sendToGAS={sendToGAS}
                                deleteFromGAS={deleteFromGAS}
                                onBack={() => changeView(historyIsAdminMode ? 'admin' : 'punch')}
                            />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
