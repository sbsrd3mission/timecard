<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマート出退勤管理 - 自然なカフェデザイン</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- ExcelJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6b4c3a',
                        secondary: '#84cc16',
                        accent: '#d97706',
                        surface: '#fefae0',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap');
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fdfbf7;
            color: #4a3b32;
            background-image: radial-gradient(#e5ddd0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .wood-border {
            border: 4px solid #8b5a2b;
            border-radius: 20px;
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay { background-color: rgba(107, 76, 58, 0.6); backdrop-filter: blur(2px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- アイコン ---
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
        const LeafIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>;
        const HistoryIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>;

        // --- データ管理（LocalStorage） ---
        const useAppData = () => {
            const [staffList, setStaffList] = useState(() => {
                const saved = localStorage.getItem('timecard_staff_v2');
                if (saved) return JSON.parse(saved);
                
                const oldSaved = localStorage.getItem('timecard_staff');
                if (oldSaved) {
                    return JSON.parse(oldSaved).map(s => typeof s === 'string' ? { name: s, defaultMeal: true } : s);
                }
                return ["草野", "田中", "小出", "高橋", "小田", "林", "山田", "市川（悠）", "谷口", "森川", "五十嵐", "市川（公）"].map(name => ({
                    name, defaultMeal: true
                }));
            });

            const [timeRecords, setTimeRecords] = useState(() => {
                const saved = localStorage.getItem('timecard_records');
                return saved ? JSON.parse(saved) : [];
            });

            // パスワード設定（デフォルトは 0000）
            const [adminPin, setAdminPin] = useState(() => {
                return localStorage.getItem('admin_pin') || '0000';
            });

            useEffect(() => { localStorage.setItem('timecard_staff_v2', JSON.stringify(staffList)); }, [staffList]);
            useEffect(() => { localStorage.setItem('timecard_records', JSON.stringify(timeRecords)); }, [timeRecords]);
            useEffect(() => { localStorage.setItem('admin_pin', adminPin); }, [adminPin]);

            return { staffList, setStaffList, timeRecords, setTimeRecords, adminPin, setAdminPin };
        };

        const calculateDuration = (start, end) => {
            if (!start || !end) return 0;
            const parse = t => {
                const [h,m,s] = t.split(':').map(Number);
                return (h || 0) * 3600 + (m || 0) * 60 + (s || 0);
            };
            const diff = parse(end) - parse(start);
            return diff > 0 ? diff : 0;
        };
        
        const formatTimeHM = (t) => t ? t.substring(0, 5) : '';

        // --- 時計コンポーネント ---
        const RealtimeClock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            const dateStr = `${time.getFullYear()}年${time.getMonth() + 1}月${time.getDate()}日 (${days[time.getDay()]})`;
            const timeStr = time.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            return (
                <div className="text-center my-4 bg-white/60 p-4 rounded-xl shadow-sm border border-secondary/20">
                    <p className="text-lg text-primary/80 font-bold">{dateStr}</p>
                    <p className="text-5xl font-bold text-primary tabular-nums tracking-widest mt-1">{timeStr}</p>
                </div>
            );
        };

        // --- モーダル: 編集・自己申請フォーム ---
        const EditRecordModal = ({ recordId, dateStr, dayOfWeek, defaultStaffName, initialRecord, onClose, onSave, isAdmin, isPaidLeaveMode }) => {
            const [clockIn, setClockIn] = useState(initialRecord?.clockIn ? formatTimeHM(initialRecord.clockIn) : '');
            const [clockOut, setClockOut] = useState(initialRecord?.clockOut ? formatTimeHM(initialRecord.clockOut) : '');
            const [breakStart, setBreakStart] = useState(initialRecord?.breakStart ? formatTimeHM(initialRecord.breakStart) : '');
            const [breakEnd, setBreakEnd] = useState(initialRecord?.breakEnd ? formatTimeHM(initialRecord.breakEnd) : '');
            const [additionalBreak, setAdditionalBreak] = useState(initialRecord?.additionalBreakMins || 0);
            const [meal, setMeal] = useState(initialRecord?.meal || false);
            const [remarks, setRemarks] = useState(initialRecord?.remarks || '');
            const [isPaidLeave, setIsPaidLeave] = useState(initialRecord?.isPaidLeave || isPaidLeaveMode);

            const handleSave = () => {
                if (isPaidLeave) {
                    const confirmLeave = window.confirm(`${dateStr} を【有給申請】で登録しますか？\n（出勤時刻などの入力内容はクリアされます）`);
                    if (!confirmLeave) return;
                } else {
                    if (!clockIn && clockOut) { alert("🚨 エラー：出勤時間が入力されていません！"); return; }
                    if (clockIn && clockOut && clockOut < clockIn) { alert("🚨 エラー：退勤時間は出勤時間より後である必要があります！"); return; }
                    if (breakStart && !breakEnd) { alert("🚨 エラー：中抜けの終了時間がありません！"); return; }
                    if (!breakStart && breakEnd) { alert("🚨 エラー：中抜けの開始時間がありません！"); return; }
                }

                const safeTimeStr = (hm) => hm ? hm + ':00' : null;
                const finalRemarks = remarks.trim();
                let systemAppendedRemarks = finalRemarks;
                
                if (!isAdmin && !isPaidLeave) {
                    if (!systemAppendedRemarks.includes('【本人修正済】')) {
                        systemAppendedRemarks += (systemAppendedRemarks ? ' ' : '') + '【本人修正済】';
                    }
                }

                let finalRecord = {
                    id: recordId, staffName: defaultStaffName, date: dateStr,
                    clockIn: isPaidLeave ? null : safeTimeStr(clockIn),
                    clockOut: isPaidLeave ? null : safeTimeStr(clockOut),
                    breakStart: isPaidLeave ? null : safeTimeStr(breakStart),
                    breakEnd: isPaidLeave ? null : safeTimeStr(breakEnd),
                    additionalBreakMins: isPaidLeave ? 0 : parseInt(additionalBreak) || 0,
                    meal: isPaidLeave ? false : meal,
                    isPaidLeave: isPaidLeave,
                    remarks: systemAppendedRemarks
                };
                onSave(finalRecord);
            };

            const handleDelete = () => {
                if (window.confirm(`本当に ${dateStr} のすべての打刻データ（有給申請含む）を取り消してクリアしますか？\n（この操作は元に戻せません）`)) {
                    onSave(null);
                }
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 animate-fade-in">
                    <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className={`p-4 text-white flex justify-between items-center ${isPaidLeave ? 'bg-sky-500' : 'bg-primary'}`}>
                            <h3 className="font-bold text-lg flex items-center gap-2">
                                {isPaidLeave ? '🏖 有給申請' : '✏️ 打刻データの修正'}
                            </h3>
                            <button onClick={onClose} className="hover:bg-black/20 p-1 rounded-full transition-colors"><CloseIcon /></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto flex-1">
                            <div className="text-center font-bold text-xl mb-4 border-b-2 border-primary/10 pb-2">
                                {dateStr} ({dayOfWeek})
                            </div>
                            
                            <label className={`block border-2 rounded-xl p-3 mb-6 cursor-pointer transition-colors ${isPaidLeave ? 'border-sky-500 bg-sky-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                <div className="flex items-center justify-between">
                                    <span className={`font-bold text-lg ${isPaidLeave ? 'text-sky-600' : 'text-gray-500'}`}>🏖 この日を有給申請にする</span>
                                    <input type="checkbox" checked={isPaidLeave} onChange={(e) => setIsPaidLeave(e.target.checked)} className="w-6 h-6 border-2 accent-sky-500" />
                                </div>
                                {isPaidLeave && <p className="text-xs text-sky-600 mt-2">※出力時に「有給申請」として自動記録されます。</p>}
                            </label>

                            {!isPaidLeave && (
                                <div className="space-y-4 animate-fade-in">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-primary mb-1">出勤</label>
                                            <input type="time" value={clockIn} onChange={(e) => setClockIn(e.target.value)} className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-primary mb-1">退勤</label>
                                            <input type="time" value={clockOut} onChange={(e) => setClockOut(e.target.value)} className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 bg-surface p-3 rounded-xl border border-primary/10">
                                        <div>
                                            <label className="block text-xs font-bold text-primary/70 mb-1">中抜け開始</label>
                                            <input type="time" value={breakStart} onChange={(e) => setBreakStart(e.target.value)} className="w-full border border-primary/20 rounded-lg p-2 font-bold focus:border-secondary focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-primary/70 mb-1">中抜け終了</label>
                                            <input type="time" value={breakEnd} onChange={(e) => setBreakEnd(e.target.value)} className="w-full border border-primary/20 rounded-lg p-2 font-bold focus:border-secondary focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="flex gap-4 items-end">
                                        <div className="flex-1">
                                            <label className="block text-xs font-bold text-primary mb-1">追加の休憩（分）</label>
                                            <input type="number" value={additionalBreak} onChange={(e) => setAdditionalBreak(e.target.value)} min="0" className="w-full border-2 border-primary/20 rounded-xl p-2 font-bold text-lg focus:border-secondary focus:outline-none" />
                                        </div>
                                        <label className="flex-1 flex items-center justify-center space-x-2 cursor-pointer border-2 border-primary/20 rounded-xl p-2 hover:bg-surface transition-colors">
                                            <input type="checkbox" checked={meal} onChange={(e) => setMeal(e.target.checked)} className="w-5 h-5 accent-secondary" />
                                            <span className="font-bold text-primary">🥗 賄い</span>
                                        </label>
                                    </div>
                                </div>
                            )}

                            <div className="mt-4">
                                <label className="block text-xs font-bold text-primary mb-1">備考</label>
                                <textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} rows="3" placeholder="コメントや申請理由など..." className="w-full border-2 border-primary/20 rounded-xl p-2 text-sm focus:border-secondary focus:outline-none resize-none"></textarea>
                                {!isAdmin && !isPaidLeave && (
                                    <div className="mt-2 p-2 bg-amber-50 rounded text-xs text-amber-700 font-bold border border-amber-200">
                                        ⚠️ 保存した場合、日付の備考欄に「本人修正済」と記録が残ります。
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="p-4 border-t-2 border-primary/10 bg-gray-50 flex justify-between gap-3">
                            <button onClick={handleDelete} className="px-4 py-3 text-sm font-bold text-danger hover:bg-danger/10 rounded-xl transition-colors">
                                完全取消
                            </button>
                            <div className="flex gap-2 w-full justify-end">
                                <button onClick={onClose} className="px-5 py-3 text-sm font-bold text-primary bg-white border-2 border-primary/20 rounded-xl hover:bg-gray-100 transition-colors">
                                    キャンセル
                                </button>
                                <button onClick={handleSave} className="px-6 py-3 text-sm font-bold text-white bg-primary rounded-xl hover:bg-primary/90 transition-colors shadow-md">
                                    保存する
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- カレンダー・履歴マネージャー ---
        const MonthlyTimeEditor = ({ staffName, isAdmin, timeRecords, setTimeRecords, onBack }) => {
            const [selectedMonth, setSelectedMonth] = useState(() => {
                const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [editModalData, setEditModalData] = useState(null);

            const [yearStr, monthStr] = selectedMonth.split('-');
            const year = parseInt(yearStr);
            const month = parseInt(monthStr);
            const daysInMonth = new Date(year, month, 0).getDate();

            const handleSaveRecord = (newRecord) => {
                const recordId = editModalData.recordId;
                if (newRecord === null) {
                    setTimeRecords(prev => prev.filter(r => r.id !== recordId));
                } else {
                    setTimeRecords(prev => [...prev.filter(r => r.id !== recordId), newRecord]);
                }
                setEditModalData(null);
            };

            const renderTableRows = () => {
                const rows = [];
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(year, month - 1, d);
                    const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][dateObj.getDay()];
                    const rowBgClass = dateObj.getDay() === 0 ? 'bg-red-50' : dateObj.getDay() === 6 ? 'bg-blue-50' : 'bg-white hover:bg-surface transition-colors cursor-pointer';

                    const dateStrLong = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const recordId = `${staffName}_${dateStrLong}`;
                    const record = timeRecords.find(r => r.id === recordId);

                    rows.push(
                        <tr key={d} className={`border-b border-primary/10 ${rowBgClass}`} onClick={() => setEditModalData({ recordId, dateStr: dateStrLong, dayOfWeek, record, isPaidLeaveMode: false })}>
                            <td className="p-3 text-center border-r border-primary/10 font-bold whitespace-nowrap">
                                {d} <span className="text-xs text-gray-500">({dayOfWeek})</span>
                            </td>
                            {record ? (
                                record.isPaidLeave ? (
                                    <>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-3 text-center text-primary/30">-</td>
                                        <td className="p-2 text-center text-sm font-bold text-sky-600 truncate max-w-[100px]" title={record.remarks}>
                                            【有給申請】 {record.remarks}
                                        </td>
                                        <td className="p-2 text-center">
                                            <button className="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">修正</button>
                                        </td>
                                    </>
                                ) : (
                                    <>
                                        <td className="p-3 text-center font-bold text-primary">{formatTimeHM(record.clockIn) || '-'}</td>
                                        <td className="p-3 text-center font-bold text-[#b45309]">{formatTimeHM(record.clockOut) || '-'}</td>
                                        <td className="p-3 text-center text-xs text-primary/70">
                                            {formatTimeHM(record.breakStart)}〜{formatTimeHM(record.breakEnd)}
                                            {record.additionalBreakMins > 0 && <span className="block text-[10px] text-accent">追:{record.additionalBreakMins}分</span>}
                                        </td>
                                        <td className="p-3 text-center">{record.meal ? '🥗' : '-'}</td>
                                        <td className="p-2 text-xs truncate max-w-[100px] text-gray-500 relative">
                                            {record.remarks?.includes('【本人修正済】') ? (
                                                <span className="bg-amber-100 text-amber-700 px-1 py-0.5 rounded text-[10px] font-bold inline-block mr-1" title={record.remarks}>修正済</span>
                                            ) : ''}
                                            {record.remarks?.replace('【本人修正済】', '').trim() || '-'}
                                        </td>
                                        <td className="p-2 text-center">
                                            <button className="text-xs bg-primary/10 hover:bg-primary/20 text-primary font-bold py-1 px-3 rounded-lg transition-colors shadow-sm whitespace-nowrap">修正</button>
                                        </td>
                                    </>
                                )
                            ) : (
                                <>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-3"></td>
                                    <td className="p-2 text-center opacity-0 group-hover:opacity-100 transition-opacity" style={{opacity: 1}}>
                                        <div className="flex gap-1 justify-center">
                                            {!isAdmin && (
                                                <button onClick={(e) => { e.stopPropagation(); setEditModalData({ recordId, dateStr: dateStrLong, dayOfWeek, record: null, isPaidLeaveMode: true }); }} className="text-xs bg-sky-50 shadow-sm text-sky-600 font-bold py-1 px-2 rounded-lg hover:bg-sky-100 whitespace-nowrap border border-sky-200">有給</button>
                                            )}
                                            <button className="text-xs bg-white border border-primary/20 shadow-sm text-primary font-bold py-1 px-2 rounded-lg hover:bg-surface whitespace-nowrap">新規・修正</button>
                                        </div>
                                    </td>
                                </>
                            )}
                        </tr>
                    );
                }
                return rows;
            };

            return (
                <div className="animate-fade-in space-y-4 w-full text-left relative z-10">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="text-sm border-2 border-primary/20 bg-white hover:bg-gray-50 font-bold px-4 py-2 rounded-xl text-primary transition-colors flex items-center gap-1 shadow-sm">
                            ← {isAdmin ? '管理者メニューへ戻る' : '打刻画面へ戻る'}
                        </button>
                        <h2 className="text-xl font-bold text-primary flex items-center gap-1">
                            {isAdmin ? '🔧' : '📊'} 履歴・修正
                        </h2>
                    </div>

                    <div className="bg-white p-5 rounded-3xl border-2 border-primary/20 shadow-sm">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <div className="flex-1">
                                <p className="text-sm font-bold text-primary/60 mb-1">対象スタッフ</p>
                                <p className="text-2xl font-bold text-primary">{staffName} さん</p>
                            </div>
                            <div>
                                <input 
                                    type="month" 
                                    value={selectedMonth}
                                    onChange={(e) => setSelectedMonth(e.target.value)}
                                    className="border-2 border-primary/30 text-lg p-2 rounded-xl font-bold focus:border-secondary focus:outline-none bg-surface"
                                />
                            </div>
                        </div>

                        {!isAdmin && (
                            <div className="mb-4 bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs text-amber-800 font-bold">
                                💡 出勤・退勤の押し忘れ等は、カレンダーの行をタップ（クリック）して自分で修正できます。<br/>
                                🏖 「有給」を申請する場合は、空いている日をタップして「🏖 有給」を押してください。
                            </div>
                        )}

                        <div className="overflow-x-auto rounded-xl border-2 border-primary/10 shadow-inner max-h-[60vh] overflow-y-auto w-full">
                            <table className="w-full text-left border-collapse" style={{ minWidth: '700px' }}>
                                <thead className="bg-primary/5 sticky top-0 z-10 shadow-sm">
                                    <tr>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-24">日付</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-20">出勤</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-20">退勤</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-24">中抜け・休憩</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-16">賄い</th>
                                        <th className="p-3 font-bold text-sm text-primary whitespace-nowrap max-w-[150px]">備考・ログ</th>
                                        <th className="p-3 font-bold text-sm text-primary text-center whitespace-nowrap w-32">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {renderTableRows()}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {editModalData && (
                        <EditRecordModal 
                            recordId={editModalData.recordId}
                            dateStr={editModalData.dateStr}
                            dayOfWeek={editModalData.dayOfWeek}
                            defaultStaffName={staffName}
                            initialRecord={editModalData.record}
                            isAdmin={isAdmin}
                            isPaidLeaveMode={editModalData.isPaidLeaveMode}
                            onClose={() => setEditModalData(null)}
                            onSave={handleSaveRecord}
                        />
                    )}
                </div>
            );
        };

        // --- 管理者ダッシュボードコンポーネント ---
        const AdminDashboard = ({ 
            staffList, setStaffList, 
            timeRecords, setTimeRecords, 
            adminPin, setAdminPin,
            openAdminHistoryView 
        }) => {
            const [targetMonth, setTargetMonth] = useState(() => {
                const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [newStaffName, setNewStaffName] = useState('');
            const fileInputRef = useRef(null);

            const handleAddStaff = () => {
                if (newStaffName && !staffList.find(s => s.name === newStaffName)) {
                    setStaffList([...staffList, { name: newStaffName, defaultMeal: true }]);
                    setNewStaffName('');
                } else if(staffList.find(s => s.name === newStaffName)) {
                    alert('すでに同じ名前のスタッフがいます。');
                }
            };

            const toggleMealSetting = (name) => setStaffList(staffList.map(s => s.name === name ? { ...s, defaultMeal: !s.defaultMeal } : s));
            const handleRemoveStaff = (name) => {
                if (window.confirm(`${name}さんを削除しますか？\n（過去の打刻データは消えませんが、プルダウンに表示されなくなります）`)) {
                    setStaffList(staffList.filter(s => s.name !== name));
                }
            };
            
            const handleUpdatePin = () => {
                const newPin = window.prompt("新しい管理者用パスワード（4桁の数字）を入力してください：\n（忘れないようにご注意ください）");
                if (newPin) {
                    if (newPin.length !== 4 || isNaN(newPin)) {
                        alert("パスワードは4桁の半角数字で入力してください。");
                    } else {
                        setAdminPin(newPin);
                        alert(`パスワードを ${newPin} に変更しました。`);
                    }
                }
            };

            const handleExportWithTemplate = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const [yearStr, monthStr] = targetMonth.split('-');
                    const year = parseInt(yearStr);
                    const month = parseInt(monthStr);

                    const workbook = new ExcelJS.Workbook();
                    const reader = new FileReader();

                    reader.onload = async (eEvent) => {
                        const buffer = eEvent.target.result;
                        await workbook.xlsx.load(buffer);

                        staffList.forEach(staff => {
                            const ws = workbook.getWorksheet(staff.name);
                            if (!ws) return; 

                            let startRow = -1;
                            ws.eachRow((row, rowNumber) => {
                                if (startRow !== -1) return;
                                const cellA = row.getCell(1).value;
                                if (cellA instanceof Date || typeof cellA === 'number' || (typeof cellA === 'string' && cellA.match(/\d{4}[-/]\d{1,2}[-/]\d{1,2}/))) {
                                    startRow = rowNumber;
                                }
                            });
                            
                            if (startRow === -1) startRow = 2;

                            const timeToExcelFraction = (timeStr) => {
                                if (!timeStr) return null;
                                const parts = timeStr.split(':');
                                const h = parseInt(parts[0], 10) || 0;
                                const m = parseInt(parts[1], 10) || 0;
                                const s = parseInt(parts[2], 10) || 0;
                                return (h * 3600 + m * 60 + s) / 86400;
                            };

                            const daysInMonth = new Date(year, month, 0).getDate();

                            for (let d = 1; d <= 31; d++) {
                                const row = ws.getRow(startRow + d - 1);
                                
                                row.getCell(3).value = null; row.getCell(4).value = null;
                                row.getCell(5).value = null; row.getCell(6).value = null;
                                row.getCell(7).value = null; row.getCell(16).value = null;

                                if (d <= daysInMonth) {
                                    const targetDateObj = new Date(year, month - 1, d);
                                    const targetDateStrShort = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                    
                                    row.getCell(1).value = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                    row.getCell(2).value = ['日', '月', '火', '水', '木', '金', '土'][targetDateObj.getDay()];
                                    
                                    const record = timeRecords.find(r => r.id === `${staff.name}_${targetDateStrShort}`);

                                    if (record) {
                                        if (record.isPaidLeave) {
                                            row.getCell(16).value = '【有給申請】 ' + (record.remarks || '');
                                        } else {
                                            row.getCell(3).value = timeToExcelFraction(record.clockIn);
                                            row.getCell(6).value = timeToExcelFraction(record.clockOut);
                                            row.getCell(7).value = record.meal ? 1 : null;

                                            let remarks = record.remarks || '';
                                            if (record.additionalBreakMins > 0) {
                                                if (!record.breakStart && !record.breakEnd) {
                                                    row.getCell(4).value = timeToExcelFraction('12:00:00');
                                                    const endH = 12 + Math.floor(record.additionalBreakMins / 60);
                                                    const endM = record.additionalBreakMins % 60;
                                                    row.getCell(5).value = timeToExcelFraction(`${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}:00`);
                                                } else {
                                                    row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                                    row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                                    remarks += (remarks ? ' / ' : '') + `追加個別休憩：${record.additionalBreakMins}分`;
                                                }
                                            } else {
                                                row.getCell(4).value = timeToExcelFraction(record.breakStart);
                                                row.getCell(5).value = timeToExcelFraction(record.breakEnd);
                                            }
                                            row.getCell(16).value = remarks || null;
                                        }
                                    }
                                } else {
                                    row.getCell(1).value = null; row.getCell(2).value = null;
                                }
                            }
                        });

                        const outBuffer = await workbook.xlsx.writeBuffer();
                        const blob = new Blob([outBuffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                        
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `タイムカード入力_${year}${String(month).padStart(2, '0')}給与分_アプリ出力.xlsx`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        alert('出力に成功しました！');
                        fileInputRef.current.value = ""; 
                    };
                    reader.readAsArrayBuffer(file);
                } catch (error) {
                    console.error(error);
                    alert("出力中にエラーが発生しました。");
                }
            };

            return (
                <div className="animate-fade-in space-y-8 text-left w-full relative z-10">
                    <div className="border-b-2 border-primary/20 pb-4 mb-6 flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-primary flex items-center gap-2">
                            <SettingsIcon /> 管理者メニュー
                        </h2>
                        <button onClick={handleUpdatePin} className="text-xs bg-surface border border-primary/20 text-primary font-bold px-3 py-1.5 rounded-lg hover:bg-white shadow-sm">
                            🔑 パスワード変更
                        </button>
                    </div>
                    
                    <div className="p-6 bg-surface rounded-2xl border-2 border-secondary/30 shadow-sm relative overflow-hidden">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2 relative z-10">
                            🌿 月次エクセル出力
                        </h3>
                        <p className="text-sm text-primary/80 mb-4 font-medium">記入済みExcelファイルを選択して、指定の月に自動置換出力します。</p>
                        
                        <div className="flex flex-col gap-4">
                            <div>
                                <label className="block text-sm font-bold text-primary mb-2">1. 出力したい対象月</label>
                                <input type="month" value={targetMonth} onChange={(e) => setTargetMonth(e.target.value)} className="border-2 border-primary/30 text-lg p-2 rounded-xl focus:border-secondary font-bold text-primary bg-white" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-primary mb-2">2. エクセルファイルを選択</label>
                                <input type="file" accept=".xlsx" ref={fileInputRef} onChange={handleExportWithTemplate} className="block w-full text-sm text-primary file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-secondary file:text-white cursor-pointer bg-white border-2 border-primary/20 rounded-xl" />
                            </div>
                        </div>
                    </div>

                    <div className="p-6 bg-white rounded-2xl border-2 border-primary/20 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            📝 マスターデータの手動編集
                        </h3>
                        <div className="flex gap-2 mb-2 flex-wrap">
                            {staffList.map(staff => (
                                <button key={staff.name} onClick={() => openAdminHistoryView(staff.name)} className="px-4 py-2 bg-purple-50 hover:bg-purple-100 text-purple-700 font-bold border-2 border-purple-200 rounded-xl transition-colors whitespace-nowrap">
                                    {staff.name} さん
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="p-6 bg-white rounded-2xl border-2 border-primary/20 shadow-sm text-left">
                        <h3 className="font-bold text-xl text-primary mb-4 flex items-center gap-2">
                            👥 スタッフ打刻リスト＆賄い設定
                        </h3>
                        <div className="flex gap-2 mb-6">
                            <input type="text" value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} placeholder="新しいスタッフ名" className="flex-1 border-2 border-primary/20 p-3 rounded-xl focus:border-secondary text-md" onKeyPress={e => e.key === 'Enter' && handleAddStaff()} />
                            <button onClick={handleAddStaff} disabled={!newStaffName} className="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-xl disabled:opacity-50 transition-colors">追加</button>
                        </div>

                        <div className="bg-surface rounded-xl border border-primary/20 overflow-hidden">
                            <ul className="divide-y divide-primary/10 max-h-64 overflow-y-auto w-full">
                                {staffList.map(staff => (
                                    <li key={staff.name} className="p-3 flex justify-between items-center bg-white transition-colors grid grid-cols-12 gap-2">
                                        <span className="font-bold text-primary text-lg col-span-6">{staff.name}</span>
                                        <div className="col-span-4 flex justify-center"><button onClick={() => toggleMealSetting(staff.name)} className={`px-3 py-1 rounded-full text-xs font-bold transition-colors ${staff.defaultMeal ? 'bg-secondary text-white' : 'bg-gray-200 text-gray-500'}`}>{staff.defaultMeal ? '賄いあり' : '賄いなし'}</button></div>
                                        <div className="col-span-2 flex justify-center"><button onClick={() => handleRemoveStaff(staff.name)} className="text-white hover:bg-red-700 bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors whitespace-nowrap">削除</button></div>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // --- メインアプリ ---
        const App = () => {
            const { staffList, setStaffList, timeRecords, setTimeRecords, adminPin, setAdminPin } = useAppData();
            const [view, setView] = useState('punch'); 
            
            const [selectedStaffName, setSelectedStaffName] = useState('');
            const [remarks, setRemarks] = useState('');
            const [hasMeal, setHasMeal] = useState(false);

            const [historyStaffName, setHistoryStaffName] = useState('');
            const [historyIsAdminMode, setHistoryIsAdminMode] = useState(false);
            
            const handleAdminClick = () => {
                if (view === 'punch') {
                    const input = window.prompt("🔑 管理者用パスワード（4桁の数字）を入力してください。");
                    if (input === null) return;
                    if (input === adminPin) {
                        changeView('admin');
                    } else {
                        alert("パスワードが違います。");
                    }
                } else {
                    changeView('punch');
                }
            };

            const handlePunch = (type) => {
                if (!selectedStaffName) return;
                const now = new Date();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + ':00';
                const recordId = `${selectedStaffName}_${dateStr}`;
                
                let additionalBreakPromptMins = 0;
                const existingRec = timeRecords.find(r => r.id === recordId);
                
                if (existingRec?.isPaidLeave && type !== 'update_info') {
                    alert('本日すでに【有給】で申請されています！打刻する場合は、履歴画面から有給をキャンセルしてください。');
                    return;
                }

                if (type === 'out' && existingRec?.clockIn) {
                    const workSec = calculateDuration(existingRec.clockIn, timeStr);
                    if (workSec >= 6 * 3600) {
                        const hasMiddleBreak = !!(existingRec.breakStart && existingRec.breakEnd);
                        if (hasMiddleBreak) {
                            const input = window.prompt("中抜けの打刻を確認しました。\n中抜けとは別に休憩を取りましたか？\n（取った分数を半角数字で、取っていない場合は「0」を入力）", "45");
                            if (input === null) return;
                            additionalBreakPromptMins = parseInt(input) || 0;
                        } else {
                            const input = window.prompt("⚠️ 6時間以上勤務しています。\n休憩は何分でしたか？（規定通りの場合は「45」、無しは「0」）", "45");
                            if (input === null) return;
                            additionalBreakPromptMins = parseInt(input) || 0;
                        }
                    }
                }

                setTimeRecords(prev => {
                    const existing = prev.find(r => r.id === recordId) || {
                        id: recordId, staffName: selectedStaffName, date: dateStr,
                        clockIn: null, breakStart: null, breakEnd: null, clockOut: null,
                        meal: false, isPaidLeave: false, remarks: '', additionalBreakMins: 0
                    };

                    const updated = { ...existing };
                    if (type === 'in' && !updated.clockIn) updated.clockIn = timeStr;
                    if (type === 'out' && !updated.clockOut) updated.clockOut = timeStr;
                    if (type === 'break_in' && !updated.breakStart) updated.breakStart = timeStr;
                    if (type === 'break_out' && !updated.breakEnd) updated.breakEnd = timeStr;
                    
                    if (type === 'out' || type === 'update_info') {
                        updated.meal = hasMeal;
                        if (remarks) updated.remarks = updated.remarks ? updated.remarks + ' / ' + remarks : remarks;
                        if (additionalBreakPromptMins > 0) updated.additionalBreakMins = additionalBreakPromptMins;
                    }

                    return [...prev.filter(r => r.id !== recordId), updated];
                });

                const actionNames = { in: '出勤', out: '退勤', break_in: '中抜け開始', break_out: '中抜け終了', update_info: '情報更新' };
                alert(`${selectedStaffName}さん、${timeStr} に「${actionNames[type]}」として記録しました！`);
                setSelectedStaffName(''); setRemarks(''); setHasMeal(false);
            };

            useEffect(() => {
                if (selectedStaffName) {
                    const staffData = staffList.find(s => s.name === selectedStaffName);
                    const defaultMeal = staffData ? staffData.defaultMeal : true;
                    const dateStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
                    const record = timeRecords.find(r => r.id === `${selectedStaffName}_${dateStr}`);
                    if (record && record.meal !== undefined && record.clockIn) setHasMeal(record.meal);
                    else setHasMeal(defaultMeal);
                    setRemarks('');
                }
            }, [selectedStaffName, timeRecords, staffList]);

            const changeView = (newView) => { setView(newView); document.body.scrollTop = 0; };

            let currentStatus = 'スタッフを選択してください';
            let statusStyle = 'text-primary/60 border-primary/20 bg-white';
            const dateStr = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
            const currentRecord = timeRecords.find(r => r.id === `${selectedStaffName}_${dateStr}`);

            if (selectedStaffName) {
                if (currentRecord?.isPaidLeave) {
                    currentStatus = '🏖 本日は 有給申請済 です';
                    statusStyle = 'text-sky-600 bg-sky-50 border-sky-300 font-bold';
                } else if (!currentRecord || !currentRecord.clockIn) {
                    currentStatus = '💤 本日は 出勤前 です';
                    statusStyle = 'text-primary bg-primary/10 border-primary/20';
                } else if (currentRecord.clockIn && !currentRecord.clockOut) {
                    if (currentRecord.breakStart && !currentRecord.breakEnd) {
                        currentStatus = '☕ 現在 中抜け中 です';
                        statusStyle = 'text-accent bg-accent/10 border-accent/20 font-bold';
                    } else {
                        currentStatus = '🥘 現在 出勤中（勤務中）です';
                        statusStyle = 'text-[#4d7c0f] bg-secondary/20 border-secondary/40 font-bold';
                    }
                } else if (currentRecord.clockOut) {
                    currentStatus = '🏠 本日は 退勤済 です。お疲れ様でした！';
                    statusStyle = 'text-gray-500 bg-gray-100 border-gray-200';
                }
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-6 px-4">
                    <div className="w-full max-w-lg mb-6 flex flex-col items-center">
                        <div className="flex justify-center items-end gap-6 mb-2">
                            <img src="./コレトちゃん.avif" alt="コレトちゃん" className="h-20 w-auto object-contain drop-shadow-md" onError={(e) => e.target.style.display='none'} />
                            <img src="./レクトくん.png" alt="レクトくん" className="h-16 w-auto object-contain drop-shadow-md" onError={(e) => e.target.style.display='none'} />
                        </div>
                        <div className="w-full flex justify-between items-center bg-white/70 px-4 py-3 rounded-2xl shadow-sm border border-secondary/30">
                            <h1 className="text-xl sm:text-2xl font-bold text-primary flex items-center gap-1 leading-none">
                                <LeafIcon /> スマート出退勤
                            </h1>
                            <button 
                                onClick={handleAdminClick}
                                className={`flex items-center gap-1 text-xs sm:text-sm transition-colors px-3 py-2 rounded-lg shadow-sm font-bold border ${view === 'punch' ? 'bg-surface text-primary border-primary/20 hover:text-white hover:bg-primary' : 'bg-primary text-white border-transparent'}`}
                            >
                                <SettingsIcon />
                                {view === 'punch' ? '管理者メニュー' : '打刻へ戻る'}
                            </button>
                        </div>
                    </div>

                    <main className={`w-full bg-surface shadow-xl overflow-hidden wood-border p-4 sm:p-8 relative ${view==='history'?'max-w-4xl rounded-[1rem]':'max-w-lg rounded-[2rem]'}`}>
                        {view === 'punch' && (
                            <div className="animate-fade-in text-center">
                                <RealtimeClock />
                                
                                <div className="mb-6 relative z-10 text-left">
                                    <div className="relative mb-3">
                                        <select value={selectedStaffName} onChange={(e) => setSelectedStaffName(e.target.value)} className="w-full appearance-none bg-white border-[3px] border-secondary/50 text-primary py-4 px-4 pr-10 rounded-2xl focus:border-secondary transition-all text-xl font-bold shadow-sm">
                                            <option value="">-- おなまえ --</option>
                                            {staffList.map(staff => <option key={staff.name} value={staff.name}>{staff.name}</option>)}
                                        </select>
                                    </div>
                                    <div className={`w-full py-2 px-4 rounded-xl border-2 text-center text-sm transition-all duration-300 ${statusStyle}`}>{currentStatus}</div>
                                </div>

                                <div className={`transition-all duration-500 overflow-hidden ${selectedStaffName ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <button onClick={() => { setHistoryStaffName(selectedStaffName); setHistoryIsAdminMode(false); changeView('history'); }} className="w-full mb-6 bg-gradient-to-r from-teal-500 to-sky-500 hover:from-teal-400 hover:to-sky-400 text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all active:scale-95 text-lg flex justify-center items-center gap-2 border-b-4 border-teal-700">
                                        <HistoryIcon />今月の打刻履歴を見る・修正する / 有給申請
                                    </button>

                                    <div className="mb-6 text-left">
                                        <div className={`grid grid-cols-2 gap-3 ${currentRecord?.isPaidLeave ? 'opacity-30 pointer-events-none' : ''}`}>
                                            <button onClick={() => handlePunch('in')} className="col-span-1 bg-gradient-to-br from-secondary to-[#65a30d] hover:brightness-110 text-white font-bold py-6 px-4 rounded-2xl shadow-md transition-all active:scale-95 text-2xl border-b-4 border-[#4d7c0f]">出勤</button>
                                            <button onClick={() => handlePunch('out')} className="col-span-1 bg-gradient-to-br from-accent to-[#b45309] hover:brightness-110 text-white font-bold py-6 px-4 rounded-2xl shadow-md transition-all active:scale-95 text-2xl border-b-4 border-[#78350f]">退勤</button>
                                            <button onClick={() => handlePunch('break_in')} className="col-span-1 bg-white hover:bg-gray-50 text-primary font-bold py-4 px-4 rounded-xl shadow-sm border-2 border-primary/20 transition-all active:scale-95 mt-2">中抜け開始</button>
                                            <button onClick={() => handlePunch('break_out')} className="col-span-1 bg-white hover:bg-gray-50 text-primary font-bold py-4 px-4 rounded-xl shadow-sm border-2 border-primary/20 transition-all active:scale-95 mt-2">中抜け終了</button>
                                        </div>
                                    </div>

                                    <div className="text-left">
                                        <div className="bg-white/80 rounded-2xl p-4 border-2 border-primary/10 mb-2 shadow-sm">
                                            <label className="flex items-center space-x-3 cursor-pointer mb-5 p-2 bg-surface rounded-xl border border-primary/10 hover:bg-white transition-colors">
                                                <input type="checkbox" checked={hasMeal} onChange={(e) => setHasMeal(e.target.checked)} className="w-7 h-7 accent-secondary cursor-pointer" />
                                                <span className="text-primary font-bold text-lg">🥗 賄いあり</span>
                                            </label>
                                            <label className="block text-sm font-bold text-primary mb-2">📝 備考（フリーコメント）</label>
                                            <input type="text" value={remarks} onChange={(e) => setRemarks(e.target.value)} placeholder="例：交通費〇〇円 など" className="w-full border-2 border-primary/20 p-3 rounded-xl focus:border-secondary transition-colors" />
                                        </div>
                                        <div className="flex justify-end mt-2"><button onClick={() => handlePunch('update_info')} className="text-sm bg-primary/10 hover:bg-primary/20 text-primary border border-primary/30 py-2 px-5 rounded-xl font-bold transition-colors shadow-sm">情報のみ保存</button></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <AdminDashboard 
                                staffList={staffList} setStaffList={setStaffList} 
                                timeRecords={timeRecords} setTimeRecords={setTimeRecords} 
                                adminPin={adminPin} setAdminPin={setAdminPin}
                                openAdminHistoryView={(name) => { setHistoryStaffName(name); setHistoryIsAdminMode(true); changeView('history'); }}
                            />
                        )}

                        {view === 'history' && (
                            <MonthlyTimeEditor 
                                staffName={historyStaffName}
                                isAdmin={historyIsAdminMode}
                                timeRecords={timeRecords}
                                setTimeRecords={setTimeRecords}
                                onBack={() => changeView(historyIsAdminMode ? 'admin' : 'punch')}
                            />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
